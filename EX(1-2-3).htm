    <style>
        :root {
            /* Light, calm eye-friendly colors */
            --primary: #4A90E2;
            --bg-color: #F8FAFC;
            --text-color: #2C3E50;
            --highlight: #FFE0B2;
            --correct: #D4EDDA;
            --correct-border: #28A745;
            --wrong: #F8D7DA;
            --wrong-border: #DC3545;
            --border: #E1E8ED;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            font-size: 18px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1, h2, h3 { text-align: center; color: var(--primary); }
        .ru-trans { font-size: 0.85em; color: #7F8C8D; display: block; margin-top: -5px; margin-bottom: 15px; text-align: center;}
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Reading & Highlight */
        .reading-box { background: #fff; padding: 20px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px;}
        .highlight { background-color: var(--highlight); padding: 0 4px; border-radius: 4px;}
        
        /* Details Table */
        details { background: #fdfdfd; border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 20px; cursor: pointer; }
        summary { font-weight: bold; color: var(--primary); outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        th { background-color: var(--primary); color: white; }

        /* Questions */
        .question-block { background: #FAFAFA; border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .q-text { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        button.option-btn {
            background: white; border: 2px solid var(--border); padding: 10px; border-radius: 6px; font-size: 1em; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        button.option-btn:hover { border-color: var(--primary); }
        button.option-btn.correct { background: var(--correct); border-color: var(--correct-border); pointer-events: none;}
        button.option-btn.wrong { background: var(--wrong); border-color: var(--wrong-border); pointer-events: none;}

        /* Sort & Fill */
        .sort-area { min-height: 50px; border: 2px dashed var(--primary); padding: 10px; margin-bottom: 10px; border-radius: 6px; display: flex; gap: 10px; flex-wrap: wrap;}
        .words-bank { display: flex; gap: 10px; flex-wrap: wrap; }
        .word-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        select.fill-select { padding: 8px; font-size: 1em; border-radius: 5px; border: 1px solid var(--border); margin: 5px; font-family: inherit;}
        .flash-wrong { animation: shake 0.5s; background-color: var(--wrong) !important; border-color: var(--wrong-border) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }
        
        textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 1em; resize: vertical;}
        
        /* Navigation */
        .nav-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; font-size: 1.1em; border-radius: 6px; cursor: pointer; display: block; margin: 20px auto; transition: 0.3s; }
        .nav-btn:hover { background: #357ABD; }
        .nav-btn:disabled { background: #BDC3C7; cursor: not-allowed; }
        
        #result-screen { text-align: center; }
        .score-text { font-size: 2em; color: var(--primary); font-weight: bold; }
    </style>
</head>

/* =========================================

   ========================================= */
function initQuiz() {
    const container = document.getElementById('quiz-container');
    
    // Section 1: Reading + 10 MCQ + 10 TF
    container.innerHTML += `
        <div id="sec1" class="section active">
            <h2>الْقِسْمُ الْأَوَّلُ: الْقِرَاءَةُ وَالِاسْتِيعَابُ</h2>

            </div>
            
            <details>
                <summary>جَدْوَلُ الْمُفْرَدَاتِ (Словарь) - اضْغَطْ هُنَا لِلْعَرْضِ</summary>
                <table>
                    <tr><th>الْكَلِمَةُ</th><th>الْمَعْنَى</th><th>الْمِثَالُ</th><th>الترجمة الروسية</th></tr>
                    <tr><td>مُسْتَأْجَرَة</td><td>تَدْفَعُ مَالاً لِتَسْكُنَ فِيهَا</td><td>أَسْكُنُ فِي شَقَّةٍ مُسْتَأْجَرَةٍ.</td><td>Арендованная</td></tr>
                    <tr><td>أَرِيكَة</td><td>مَقْعَدٌ مُرِيحٌ لِلْجُلُوسِ</td><td>أَجْلِسُ عَلَى الْأَرِيكَةِ.</td><td>Диван</td></tr>
                    <tr><td>سَخَّان</td><td>جِهَازٌ يَجْعَلُ الْمَاءَ حَارّاً</td><td>السَّخَّانُ فِي الْحَمَّامِ.</td><td>Водонагреватель</td></tr>
                    <tr><td>لَا تَتْرُكِي</td><td>طَلَبُ عَدَمِ الْفِعْلِ (نَهْيٌ)</td><td>لَا تَتْرُكِي الْبَابَ مَفْتُوحاً.</td><td>Не оставляй</td></tr>

    // Section 3: Grammar TF
    container.innerHTML += buildSectionWrapper(3, "الْقِسْمُ الثَّالِثُ: الصَّوَابُ وَالْخَطَأُ (Грамматика - Верно/Неверно)", sec3_TF, buildTFHTML);
    // Section 4: Plural/Singular MCQ
    container.innerHTML += buildSectionWrapper(4, "الْقِسْمُ الرَّابِعُ: الْمُفْرَدُ وَالْجَمْعُ وَالْمُضَادُّ (Единств./Множеств./Антонимы)", sec4_MCQ, buildMCQHTML);
    
    // Section 5: Fill Blanks
    let sec5HTML = `<div id="sec5" class="section">
        <h2>الْقِسْمُ الْخَامِسُ: اِمْلَأِ الْفَرَاغَ</h2><span class="ru-trans">Раздел 5: Заполните пропуски</span>`;
    const optionsHTML = fillWords.map((w, index) => `<option value="${index}">${w}</option>`).join('');
    sec5_Fill.forEach((q, i) => {
        const [qText, correctIdx] = q; // Destructure
        const parts = qText.split(".................");
        sec5HTML += `<div class="question-block">
            ${i+1}. ${parts} <select class="fill-select" data-correct="${correctIdx}" onchange="checkFill(this)"><option value="">--- اختر ---</option>${optionsHTML}</select> ${parts[1]}
        </div>`;
    });
    sec5HTML += `<button class="nav-btn" onclick="nextSection(5)">الْقِسْمُ التَّالِي (Следующий раздел)</button></div>`;
    container.innerHTML += sec5HTML;

    // Section 6: Ordering
    let sec6HTML = `<div id="sec6" class="section">
        <h2>الْقِسْمُ السَّادِسُ: تَرْتِيبُ الْجُمَلِ</h2><span class="ru-trans">Раздел 6: Составьте предложения</span>`;
    sec6_Order.forEach((q, i) => {
        const [correctSentence, scrambledArr] = q; // Destructure
        sec6HTML += `<div class="question-block" id="sort-q-${i}">
            <div class="q-text">${i+1}. رَتِّبِ الْكَلِمَاتِ:</div>

            <div class="words-bank" id="bank-${i}">
                ${scrambledArr.map((w, wIdx) => `<button class="word-btn" id="word-${i}-${wIdx}" onclick="moveWord('${i}', this)">${w}</button>`).join('')}
            </div>
        </div>`;
    });
    sec6HTML += `<button class="nav-btn" onclick="nextSection(6)">الْقِسْمُ التَّالِي (Следующий раздел)</button></div>`;
    container.innerHTML += sec6HTML;

    // Section 7: Composition
    let sec7HTML = `<div id="sec7" class="section">
        <h2>الْقِسْمُ السَّابِعُ: الْإِنْشَاءُ</h2><span class="ru-trans">Раздел 7: Письмо</span>
        <p>ضَعِ الْكَلِمَاتِ التَّالِيَةَ فِي جُمَلٍ مُفِيدَةٍ (يُصَحَّحُ يَدَوِيّاً):</p>`;
    sec7_Words.forEach((w, i) => {
        sec7HTML += `<div class="question-block">
            <div class="q-text">${i+1}. ${w}</div>
            <textarea placeholder="اكْتُبْ جُمْلَةً هُنَا..."></textarea>

    });
    sec7HTML += `<button class="nav-btn" onclick="finishQuiz()">إِنْهَاءُ الِاخْتِبَارِ (Завершить тест)</button></div>`;
    container.innerHTML += sec7HTML;
}

function buildSectionWrapper(secNum, title, dataArray, buildFunc) {
    let html = `<div id="sec${secNum}" class="section"><h2>${title}</h2>`;
    dataArray.forEach((q, i) => { html += buildFunc(secNum, i, q); });
    html += `<button class="nav-btn" onclick="nextSection(${secNum})">الْقِسْمُ التَّالِي (Следующий раздел)</button></div>`;
    return html;
}

// Destructuring used strictly here
function buildMCQHTML(secNum, qIndex, data) {
    const [qText, optionsArray, correctIndex] = data; 
    let html = `<div class="question-block"><div class="q-text">${qIndex+1}. ${qText}</div><div class="options-grid">`;
    optionsArray.forEach((opt, idx) => {
        html += `<button class="option-btn" onclick="checkMCQ(this, ${idx === correctIndex})">${opt}</button>`;
    });
    html += `</div></div>`;
    return html;
}

// Destructuring used strictly here
function buildTFHTML(secNum, qIndex, data) {
    const [qText, isTrue] = data;
    return `<div class="question-block">
        <div class="q-text">${qText}</div>
        <div class="options-grid">
            <button class="option-btn" onclick="checkMCQ(this, ${isTrue === true})">صَحِيحٌ (Верно)</button>
            <button class="option-btn" onclick="checkMCQ(this, ${isTrue === false})">خَطَأٌ (Неверно)</button>
        </div>
    </div>`;
}

/* =========================================
   Logic & Feedback
   ========================================= */
function checkMCQ(btn, isCorrect) {
    const parent = btn.parentElement;
    // Disable all buttons in this question
    Array.from(parent.children).forEach(b => b.style.pointerEvents = 'none');
    
    if (isCorrect) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        // Highlight correct answer
        Array.from(parent.children).forEach(b => {
            if(b.getAttribute('onclick').includes('true')) b.classList.add('correct');
        });
    }
}

function checkFill(selectEl) {
    const selected = selectEl.value;
    const correct = selectEl.getAttribute('data-correct');
    
    if (selected === correct) {
        selectEl.style.backgroundColor = 'var(--correct)';
        selectEl.style.borderColor = 'var(--correct-border)';
        selectEl.disabled = true;
        score++;
    } else if(selected !== "") {
        selectEl.classList.add('flash-wrong');
        setTimeout(() => {
            selectEl.classList.remove('flash-wrong');
            selectEl.value = "";
        }, 1000);
    }
}

function moveWord(qIdx, btn) {
    const area = document.getElementById(`area-${qIdx}`);
    const bank = document.getElementById(`bank-${qIdx}`);
    
    if (btn.parentElement.id.includes('bank')) {
        area.appendChild(btn);
    } else {
        bank.appendChild(btn);
    }
    
    // Check if bank is empty (all words moved)
    if (bank.children.length === 0) {
        const currentSentence = Array.from(area.children).map(b => b.innerText).join(' ');
        const correctSentence = area.getAttribute('data-correct');
        
        if (currentSentence === correctSentence) {
            area.style.borderColor = 'var(--correct-border)';
            area.style.backgroundColor = 'var(--correct)';
            Array.from(area.children).forEach(b => {
                b.style.backgroundColor = 'var(--correct-border)';
                b.style.pointerEvents = 'none';
            });
            score++;
        } else {
            area.classList.add('flash-wrong');
            setTimeout(() => {
                area.classList.remove('flash-wrong');
                // return words to bank
                Array.from(area.children).forEach(b => bank.appendChild(b));
            }, 1000);
        }
    }
}

function nextSection(current) {
    document.getElementById(`sec${current}`).classList.remove('active');
    document.getElementById(`sec${current+1}`).classList.add('active');
    window.scrollTo(0,0);
}

function finishQuiz() {
    document.getElementById('sec7').classList.remove('active');
    const resScreen = document.getElementById('result-screen');
    resScreen.classList.add('active');
    
    const maxAutoScore = sec1_MCQ.length + sec1_TF.length + sec2_MCQ.length + sec3_TF.length + sec4_MCQ.length + sec5_Fill.length + sec6_Order.length;
    document.getElementById('final-score').innerText = `${score} / ${maxAutoScore}`;
    window.scrollTo(0,0);
}

window.onload = initQuiz;
</script>
