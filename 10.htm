<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة اختبر نفسك - المحاضرة العاشرة (أصول الفقه)</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #8e44ad;
            --secondary-color: #9b59b6;
            --correct-color: #27ae60; 
            --wrong-color: #e67e22; 
            --bg-color: #f4f0f9;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 850px;
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 2em;
        }

        .progress {
            font-size: 1.2em;
            font-weight: 700;
            color: #4b5563;
            background: #e5e7eb;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .question-box {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #111827;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8fafc;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 1.25em;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: right;
            color: var(--text-color);
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f0e6f7;
            border-color: var(--secondary-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-color) !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: #d35400 !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background-color: #fdfaf0;
            border-right: 6px solid var(--primary-color);
            display: none;
            line-height: 1.7;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .feedback-box h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.3em;
        }

        .feedback-text {
            font-size: 1.15em;
            font-weight: 500;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: var(--secondary-color);
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>🛑 لُعْبَةُ اخْتَبِرْ نَفْسَكَ - الْمَحَاضِرَةُ الْعَاشِرَةُ 🛑</h1>
        <div class="progress" id="progress-text">السُّؤَالُ 1 مِنْ 80</div>
    </div>

    <div class="question-box">
        <div class="question-text" id="question-text">جَارِي تَحْمِيلُ السُّؤَالِ...</div>
        <div class="options-container" id="options-container"></div>
    </div>

    <div class="feedback-box" id="feedback-box">
        <h3>التَّعْلِيلُ وَالتَّفْسِيرُ الصَّحِيحُ:</h3>
        <div class="feedback-text" id="feedback-text"></div>
    </div>

    <div class="navigation">
        <button class="nav-btn" id="prev-btn" onclick="prevQuestion()">السَّهْمُ السَّابِقُ ➔</button>
        <button class="nav-btn" id="next-btn" onclick="nextQuestion()">السَّهْمُ التَّالِي 🡄</button>
    </div>
</div>

<script>
    const questions = [
        // 🔹 القسم الأول: أسئلة الاختيار من متعدد (40 سؤالاً) 🔹
        {
            question: "1. مَا هُوَ تَعْرِيفُ «الْقِيَاسِ» اصْطِلَاحاً كَمَا ذَكَرَهُ الْمُصَنِّفُ؟",
            options: [

                "الْإِلْحَاقُ بِالنَّصِّ الْقَطْعِيِّ بِلَا عِلَّةٍ.",
                "مَا اقْتَضَاهُ الدَّلِيلُ الشَّرْعِيُّ مِنْ وُجُوبٍ أَوْ تَحْرِيمٍ."
            ],
            correctIndex: 1,
            explanation: "الْقِيَاسُ لُغَةً هُوَ التَّقْدِيرُ وَالْمُسَاوَاةُ، وَاصْطِلَاحاً هُوَ تَسْوِيَةُ فَرْعٍ بِأَصْلٍ فِي حُكْمٍ لِعِلَّةٍ جَامِعَةٍ بَيْنَهُمَا [1, 2]."
        },
        {
            question: "2. مَا هُوَ الْمُصْطَلَحُ الَّذِي يُطْلَقُ عَلَى «الْمَقِيسِ عَلَيْهِ» فِي أَرْكَانِ الْقِيَاسِ؟",
            options: [
                "الْفَرْعُ.",
                "الْعِلَّةُ.",
                "الْأَصْلُ.",
                "الْحُكْمُ."

            explanation: "الْفَرْعُ هُوَ الْمَقِيسُ، بَيْنَمَا الْأَصْلُ هُوَ الْمَقِيسُ عَلَيْهِ الَّذِي وَرَدَ فِيهِ النَّصُّ [2]."
        },
        {

            options: [
                "لِأَنَّهَا أَرْخَصُ ثَمَناً مِنَ الذَّهَبِ وَالْفِضَّةِ.",
                "لِأَنَّ النَّصَّ وَرَدَ بِتَحْلِيلِهَا صَرَاحَةً.",

        {

            options: ["صَوَابٌ", "خَطَأٌ"],
            correctIndex: 1,
            explanation: "خَطَأٌ: كَوْنُهُ أَسْوَدَ هُوَ «وَصْفٌ طَرْدِيٌّ» لَا عِلَاقَةَ لَهُ بِالْحُكْمِ، وَلِذَلِكَ يَثْبُتُ الْخِيَارُ لِلْأَمَةِ إِذَا عَتَقَتْ تَحْتَ عَبْدٍ حَتَّى لَوْ كَانَ أَبْيَضَ [21, 22]."
        },
        {
            question: "79. قِيَاسُ الضَّرْبِ لِلْوَالِدَيْنِ عَلَى (التَّأْفِيفِ) يَدُلُّ عَلَى تَحَقُّقِ شَرْطِ وُجُودِ الْعِلَّةِ (الْإِيذَاءِ) فِي الْفَرْعِ كَوُجُودِهَا فِي الْأَصْلِ.",
            options: ["صَوَابٌ", "خَطَأٌ"],
            correctIndex: 0,
            explanation: "صَوَابٌ: الْعِلَّةُ الْجَامِعَةُ هِيَ (الْإِيذَاءُ)، وَهِيَ مَوْجُودَةٌ فِي الْفَرْعِ (الضَّرْبِ) بَلْ هِيَ أَوْلَى وَأَشَدُّ، مِمَّا يُصَحِّحُ الْقِيَاسَ قَطْعاً [22, 23]."
        },
        {
            question: "80. إِذَا نَزَلَتْ نَازِلَةٌ جَدِيدَةٌ كَالْمُعَامَلَاتِ الرَّقْمِيَّةِ، فَإِنَّ الْمُجْتَهِدَ يَبْحَثُ عَنْ «عِلَّتِهَا» لِيُلْحِقَهَا بِحُكْمٍ مَنْصُوصٍ فِي الْكِتَابِ أَوِ السُّنَّةِ قَدِيماً.",
            options: ["صَوَابٌ", "خَطَأٌ"],
            correctIndex: 0,
            explanation: "صَوَابٌ: هَذَا هُوَ التَّطْبِيقُ الْعَمَلِيُّ لِلْقِيَاسِ، وَهُوَ مِنْ أَعْظَمِ مَزَايَا الْفِقْهِ الْإِسْلَامِيِّ لِيَسْتَوْعِبَ كُلَّ نَوَازِلِ الْعَصْرِ حَتَّى يَوْمِ الْقِيَامَةِ بِجَامِعِ الْعِلَلِ الشَّرْعِيَّةِ [1, 68, 69]."
        }
    ];

    let currentQuestionIndex = 0;
    let selectedAnswer = false;

    const questionTextElement = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackBox = document.getElementById('feedback-box');
    const feedbackText = document.getElementById('feedback-text');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressText = document.getElementById('progress-text');

    function loadQuestion(index) {
        selectedAnswer = false;
        feedbackBox.style.display = 'none';
        
        const currentQ = questions[index];
        questionTextElement.innerText = currentQ.question;
        progressText.innerText = `السُّؤَالُ ${index + 1} مِنْ ${questions.length}`;

        optionsContainer.innerHTML = '';

        currentQ.options.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = () => checkAnswer(i, btn, currentQ);
            optionsContainer.appendChild(btn);
        });

        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === questions.length - 1;
    }

    function checkAnswer(selectedIndex, btnElement, currentQ) {
        if (selectedAnswer) return; 
        selectedAnswer = true;

        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQ.correctIndex) {
            btnElement.classList.add('correct');
        } else {
            btnElement.classList.add('wrong');
            allButtons[currentQ.correctIndex].classList.add('correct');
        }

        feedbackText.innerText = currentQ.explanation;
        feedbackBox.style.display = 'block';
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    // التهيئة الأولى
    loadQuestion(currentQuestionIndex);
</script>

</html>
