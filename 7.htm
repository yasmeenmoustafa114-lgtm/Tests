<script>
    // قاعدة بيانات الأسئلة
    const questions = [
        {
            t: `من أثبت وقوع المجاز في اللغة ونفاه في القرآن، فقوله من الناحية الأصولية يُعد:`,
            o: [`متسقاً تماماً مع لسان العرب.`, `مكابرة محضة لا تستند لأي دليل.`, `مُشكَلاً؛ لأن القرآن نزل بلسان العرب فيتعين إثباته فيه إن ثبت باللغة.`, `نزاعاً لفظياً لا ثمرة ولا تأثير له.`],
            c: 2,
            e: `أما من أثبته في اللغة ونفاه في القرآن فهذا مُشكَل، هذا القرآن نزل بلسان العرب فمن أثبته في لسان العرب تعين عليه أن يثبته في كلام الله سبحانه و تعالى لأن كلام الله نزل بلسانهم.`
        },
        {
            t: `يرى الإمام ابن قدامة أن من يمنع وقوع المجاز في اللغة بالكلية فهو:`,
            o: [`واقعٌ في نزاع لفظي.`, `يسد ذريعة للمعتزلة.`, `يُكابر.`, `الإجابتان 1 و 2 معاً.`],
            c: 2,
            e: `قال ابن قدامة رحمه الله: "ومن منع ذلك فقد كابر. ومن سلم وقال: لا أسميه مجازًا: فهو نزاع في عبارة لا فائدة في المشاحة فيه".`
        },
        {
            t: `صواب أم خطأ: الخلاف في تسمية المجاز بهذا الاسم أو إدخاله في معنى الحقيقة، يُعد من المسائل الأصولية الكبرى التي يجب على طالب العلم التوسع في ضبطها لأهميتها.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. لأن هذه المسائل "ينبغي على طالب العلم ألا يتوسع في ضبطها، لأن هذه مسائلٌ الخلاف فيها لفظيٌ وليس خلافاً حقيقياً".`
        },
        {
            t: `أي من العلماء الآتية أسماؤهم اشتهر بالاشتغال بالفقه لا التبحر في اللغة، ومع ذلك نُقل عنه نفي المجاز في اللغة مطلقاً؟`,
            o: [`أبو علي الفارسي`, `ابن جني`, `أبو إسحاق الإسفرائيني`, `التاج السبكي`],
            c: 2,
            e: `بخلاف أبي إسحاق الإسفرائيني فهو مشهور بالتفقه لا بالتبحر في علوم اللغة، أي هو مشهور بالاشتغال بالفقه (وقد ذهب إلى أن المجاز لا يقع أصلاً).`
        },
        {
            t: `المبرر الأصولي الذي حدا ببعض المتقدمين لإنكار إطلاق مصطلح "المجاز" وفقاً لما نقله الحافظ ابن رجب هو:`,
            o: [`كونه تقسيماً حادثاً لا أصل له في اللغة.`, `الخوف من توهم نفي المعاني، وسداً لذريعة الجهمية والمعتزلة في جحد حقائق النصوص.`, `أنه تقسيم اصطلاحي محض لا ثمرة فقهية تُبنى عليه.`, `الاعتماد على النقل الصحيح عن الصحابة بنفي المجاز.`],
            c: 1,
            e: `فإذا قيل: إن هذا مجاز فهموا أنه ليس تحته معنى.. فمن أنكر المجاز ينكره من باب سد الذريعة، ذريعة جحد حقائق الكتاب والسنة كما وقع للمعتزلة والجهمية.`
        },
        {
            t: `الغاية الأصولية من تضمين قيد (على وجه الاستعلاء) في تعريف "الأمر" هي:`,
            o: [`تقييد أوامر الشرع لبيان الإلزام.`, `إخراج كل ما يصدر من مساوٍ أو أدنى، كالدعاء والالتماس.`, `الرد على من ادعى أن الإشارة تقوم مقام القول.`, `حصر الأمر في خطاب الله ورسوله فقط دون العباد.`],
            c: 1,
            e: `للتفريق بين الالتماس والدعاء وغير ذلك.. فعندما نقول: "ربنا اغفر لنا".. دعاء التماس لا يُقال بأنه أمر للطاعة؛ لأنه ليس على وجه الاستعلاء.`
        },
        {
            t: `صواب أم خطأ: الإشارة التي تفيد طلب الفعل تُعد في اصطلاح الأصوليين (أمراً غير قولي) وتقوم مقام القول بقرائن الحال.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. قال: "فخرج بقولنا: (قول)؛ الإشارة فلا تسمى أمراً، وإن أفادت معناه".. في اصطلاح الأصوليين لا يقال بأنها أمر.`
        },
        {
            t: `قوله تعالى: {فَضَرۡبَ ٱلرِّقَابِ} يمثل إحدى صيغ الأمر الأصولية، وهي:`,
            o: [`فعل الأمر المباشر.`, `اسم فعل الأمر.`, `المصدر النائب عن فعل الأمر.`, `المضارع المقرون بلام الأمر.`],
            c: 2,
            e: `قال رحمه الله: "المصدر النائب عن فعل الأمر، مثل: (فَإِذَا لَقِيتُمُ ٱلَّذِينَ كَفَرُواْ فَضَرۡبَ ٱلرِّقَابِ)".`
        },
        {
            t: `اللام في قوله تعالى: {لِّتُؤۡمِنُواْ بِٱللَّهِ وَرَسُولِهِ} تُصنف أصولياً ولغوياً على أنها:`,
            o: [`لام الأمر الساكنة.`, `لام الأمر المكسورة للوجوب.`, `لام التعليل، ولام الأمر تأتي ساكنة.`, `لام التوكيد المقتضية للفورية.`],
            c: 2,
            e: `وهذه اللام في (لِّتُؤۡمِنُواْ) الأولَى أن يقال فيها أنها للتعليل.. أما لام الأمر فتكون ساكنة كقوله تعالى: (فَلۡيَحۡذَرِ).`
        },
        {
            t: `وصف الفعل بأنه (مكروه) في لسان العرب والنصوص القرآنية المتقدمة (كآية سورة الإسراء):`,
            o: [`يتطابق مع الكراهة الأصولية (ما يُثاب تاركه ولا يُعاقب فاعله).`, `يخالف اصطلاح الأصوليين، فقد يُراد به التحريم المغلظ كالكبائر والكفر.`, `يعتبر قرينة قطعية تصرف التحريم إلى التنزيه.`, `لا يُحتج به أصولياً لاختلاف دلالات الألفاظ.`],
            c: 1,
            e: `مثل الكراهة في لسان العرب ربما استعملت في الحرام، بل في الكبائر، بل في الكفر.. ووصفها الله بكونها مكروهة فهذا مخالف لاصطلاح الأصوليين.`
        },
        {
            t: `صيغة الأمر عند إطلاقها وتجردها عن القرائن، تقتضي أصولياً:`,
            o: [`الوجوب والتراخي لمراعاة قدرة المكلف.`, `الندب والفورية احتياطاً للدين.`, `الوجوب والفورية معاً.`, `الفورية فقط، ويبقى الوجوب معلقاً بالدليل الخارجي.`],
            c: 2,
            e: `صيغة الأمر عند الإطلاق تقتضي: وجوب المأمور به، والمبادرة بفعله فوراً؛ أي تقتضي الوجوب والفورية.`
        },
        {
            t: `يُستنبط من قول النبي ﷺ (لولا أن أشق على أمتي لأمرتهم بالسواك) قاعدة أصولية هي:`,
            o: [`أن الأصل في الأمر التخيير لرفع المشقة.`, `أن الأمر المطلق يقتضي الوجوب، لاقترانه بالمشقة التي تنتفي مع مجرد الاستحباب.`, `أن السواك واجب في كل حال.`, `جميع الإجابات السابقة خاطئة.`],
            c: 1,
            e: `لأن الاستحباب ليس فيه مشقة فالإنسان مخير في فعلهِ، إنما الوجوب ليس مخيراً في تركه.. فدل هذا أن الأصل في أمر النبي ﷺ الوجوب.`
        },
        {
            t: `صواب أم خطأ: القرينة الصارفة للأمر من الوجوب إلى الاستحباب محصورة بشكل حصري في الأدلة النصية القولية من الكتاب والسنة.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. لأن "القرينة أوسع من مجرد الدليل النصي.. ربما كانت هناك قرينة حالياً، وربما كانت قرينة لغوية، وربما مقاصدية".`
        },
        {
            t: `في استدلال الأصوليين بآية {فَلۡيَحۡذَرِ ٱلَّذِينَ يُخَالِفُونَ عَنۡ أَمۡرِهِ}، فإن عَدّ الفعل "يخالف" بحرف الجر "عن" أدى لتضمينه معنى:`,
            o: [`الإعراض.`, `الكفر.`, `الجحود.`, `التأجيل.`],
            c: 0,
            e: `فعل "يخالف" هنا فعل فيه تضمين؛ لأنه عُديَ بحرف الجر "عن" وهو مضمن معنى الإعراض.`
        },
        {
            t: `صواب أم خطأ: العلة في اقتضاء الأمر لـ(الفورية) هي أن المبادرة بالفعل أحوط وأبرأ، بينما التأخير يقتضي سقوط الواجب بالتقادم.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. لأن التأخير "له آفات، ويقتضي تراكم الواجبات حتى يعجز عنها" وليس سقوط الواجب.`
        },
        {
            t: `صُرف الأمر في قوله تعالى {وَإِذَا حَلَلۡتُمۡ فَٱصۡطَادُواْ} عن الوجوب ليفيد الإباحة، والقرينة الصارفة هنا هي:`,
            o: [`السياق الذي يُمدح فيه تارك الصيد.`, `وروده جواباً لما يُتوهم أنه محظور.`, `وقوع الأمر بعد حظرٍ سابق في قوله {غَيۡرَ مُحِلِّي ٱلصَّيۡدِ}.`, `الإجابتان 2 و 3 معاً.`],
            c: 2,
            e: `فالأمر بالاصطياد للإباحة لوقوعه بعد الحظر المستفاد من قوله تعالى: (غَيۡرَ مُحِلِّي ٱلصَّيۡدِ وَأَنتُمۡ حُرُمٌ).`
        },
        {
            t: `قول النبي ﷺ (افعل ولا حرج) في تقديم أفعال الحج، خرج فيه الأمر إلى الإباحة بسبب:`,
            o: [`وروده بعد حظر صريح في القرآن.`, `وروده جواباً لما يُتوهم أنه محظور.`, `أنه خطاب خاص بالسائل دون الأمة.`, `دلالته على التهديد لفاعلي المحظور.`],
            c: 1,
            e: `ومثاله جواباً لما يتوهم أنه محظور؛ قوله صلّى الله عليه وسلّم: "افعل ولا حرج"، في جواب من سألوه في حجة الوداع.. لأنهم توهموا أن هذا محظور.`
        },
        {
            t: `الأمر في قوله تعالى {ٱعۡمَلُواْ مَا شِئۡتُمۡ} لا يُراد به الإباحة أو التخيير، بل يُراد به:`,
            o: [`الاستحباب.`, `السخرية.`, `التهكم.`, `التهديد.`],
            c: 3,
            e: `التهديد كقوله تعالى: (ٱعۡمَلُواْ مَا شِئۡتُمۡ إِنَّهُۥ بِمَا تَعۡمَلُونَ بَصِيرٌ).. ولا المراد بها الإباحة.. فهذا الأمر المراد به التهديد.`
        },
        {
            t: `تأخير عائشة -رضي الله عنها- لقضاء رمضان إلى شعبان يدل أصولياً على:`,
            o: [`أن الأصل المطلق في الأمر هو التراخي.`, `جواز التراخي بشرط وجود العذر كمكان رسول الله ﷺ.`, `سقوط الفورية في أوامر العبادات المكررة.`, `أن الواجب يضيق وقته بدخوله.`],
            c: 1,
            e: `هذا النص فيه إشارة وهو أن الأمر للفورية، لكن التراخي لا بد فيه من العذر.. فقالت: (وَذَلِكَ لِمَكَانِ رَسُولِ اللَّهِ).`
        },
        {
            t: `وفقاً لقاعدة "ما لا يتم المأمور إلا به"، إذا توقف التطيب ليوم الجمعة على شراء الطيب، فإن حكم هذا الشراء يُعد:`,
            o: [`مباحاً كأصل البيوع.`, `واجباً لصحة الصلاة.`, `مندوباً، لأن وسيلة المندوب مندوبة.`, `مكروهاً إن أدى للانشغال عن الخطبة.`],
            c: 2,
            e: `ومثال المندوب: التطيب للجمعة، فإذا توقف على شراء طيب كان ذلك الشراء مندوباً.. فوسائل المأمورات مأمور بها.`
        },
        {
            t: `الصيغة المخصوصة الدالة على النهي في اصطلاح الأصوليين هي:`,
            o: [`صيغة: كُفّ، دع، اترك.`, `المضارع المقرون بـ (لا) الناهية.`, `كل لفظ دل على ذم تارك الفعل.`, `المصدر النائب عن فعل الترك.`],
            c: 1,
            e: `النهي: قول يتضمن طلب الكف على وجه الاستعلاء بصيغة مخصوصة هي المضارع المقرون بلا الناهية.`
        },
        {
            t: `صواب أم خطأ: الألفاظ الدالة على الترك مثل (دع، اترك، كف) تعتبر نواهي صريحة في اصطلاح الأصوليين لتضمنها طلب الكف.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. لأن هذه "وإن تضمنت طلب الكف لكنها بصيغة الأمر فتكون أمراً لا نهياً".`
        },
        {
            t: `صيغة النهي المطلقة والمجردة عن القرائن، تقتضي أصولياً:`,
            o: [`التحريم دون الفساد إلا في العبادات.`, `التحريم وفساد المنهي عنه.`, `الكراهة وصحة الفعل مع الإثم.`, `بطلان الفعل إذا اقترن بعقوبة.`],
            c: 1,
            e: `صيغة النهي عند الإطلاق تقتضي تحريم المنهي عنه وفساده.`
        },
        {
            t: `في استدلال الإمام الشافعي بآية {وَمَا نَهَاكُم عَنْهُ فَانْتَهُوا} على حكم محدد كقتل الزنبور، يتجلى أصل أصولي وهو:`,
            o: [`أن الآية منسوخة ومخصصة بالسنة.`, `أن العبرة بخصوص سبب نزولها في غنائم النضير.`, `أن العبرة بعموم لفظ الآية الشامل لكل ما نهى عنه الرسول ﷺ.`, `قياس الزنبور على الصيد في الإحرام.`],
            c: 2,
            e: `العبرة بعموم اللفظ لا بخصوص السبب، وهذه الآية سببها كان يتعلق بغنائم غزوة بني النضير... يعني كل ما آتاكم الرسول فخذوه.`
        },
        {
            t: `يُستدل بحديث (من عمل عملاً ليس عليه أمرنا فهو رد) على أن النهي يقتضي:`,
            o: [`التحريم المغلظ المخرج من الملة.`, `الكراهة التنزيهية.`, `الفساد والبطلان للعمل المنهي عنه.`, `وجوب القضاء الفوري.`],
            c: 2,
            e: `ومن الأدلة على أنه يقتضي الفساد قوله صلّى الله عليه وسلّم: "من عمل عملاً ليس عليه أمرنا فهو رد"؛ أي: مردود.`
        },
        {
            t: `النهي عن صوم يوم العيدين يقتضي البطلان المطلق، لأن جهة النهي هنا تعود إلى:`,
            o: [`شرط العبادة (الطهارة).`, `أمر خارج عن العبادة (الانشغال باللهو).`, `ذات المنهي عنه (الصيام نفسه).`, `أهلية المكلف بالصيام.`],
            c: 2,
            e: `مثال العائد إلى ذات المنهي عنه في العبادة: النهي عن صوم يوم العيدين.. هذا النهي يعود على الصوم نفسه.`
        },
        {
            t: `النهي عن بيع الحمل يُبطل العقد لأنه يخالف شرط العلم بالمبيع، وبذلك يكون النهي عائداً إلى:`,
            o: [`ذات المعاملة.`, `شرط المعاملة.`, `أمر خارج عن المعاملة.`, `حقوق المخلوقين.`],
            c: 1,
            e: `ومثال العائد إلى شرطه في المعاملة: النهي عن بيع الحمل، فالعلم بالمبيع شرط لصحة البيع.. لعود النهي إلى شرطه.`
        },
        {
            t: `صواب أم خطأ: ذهب جمهور الفقهاء إلى أن صلاة الرجل في ثوب الحرير باطلة تماماً لعود النهي لشرط ستر العورة، خلافاً للحنابلة الذين صححوها مع التحريم.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. العكس هو الصحيح، فالحنابلة والظاهرية يبطلونها لعود النهي للشرط، بينما أكثر الفقهاء (الجمهور) يرونها محرمة مع الصحة.`
        },
        {
            t: `إذا صلى الرجل وعليه "عمامة" من حرير، فإن صلاته صحيحة (لا تبطل) والعلة الأصولية هي:`,
            o: [`أن النهي يعود لأمر خارج عن ذات العبادة وشرطها، لكون ستر الرأس ليس شرطاً.`, `أن النهي محمول على الكراهة التنزيهية.`, `أن الحرير مستثنى في العبادات من التحريم.`, `لأنه يعود لذات العبادة، والصلاة تجبر الخلل.`],
            c: 0,
            e: `ومثال النهي العائد إلى أمر خارج في العبادة: النهي عن لبس الرجل عمامة الحرير.. لم تبطل صلاته؛ لأن النهي لا يعود إلى ذات الصلاة ولا شرطها.`
        },
        {
            t: `صرف الجمهور النهي في حديث (لا يمسن أحدكم ذكره بيمينه) من التحريم إلى الكراهة، استناداً لقرينة:`,
            o: [`وقوع النهي بصيغة المضارع.`, `التعليل المقاصدي بتنزيه اليمين وأن الأصل استعمالها في المستحسنات.`, `ورود حديث (إنما هو بضعة منك).`, `الإجابتان 2 و 3 معاً.`],
            c: 1,
            e: `فهنا خصص النص بالتعليل، لبيان علة النهي، وعلة النهي هي تنزيه يمين الإنسان.. وهذا على سبيل الاستحباب والكراهة.`
        },
        {
            t: `التعليل القائل بأن "الغش لا يبطل البيع لعوده لأمر خارج" فيه نظر، وسبب ذلك:`,
            o: [`أن الغش دائماً يعود لذات البيع.`, `أن الغش قد يكون من قبيل "الجهالة" التي تخل بشرط العلم بالمبيع، فيبطل العقد.`, `أن النهي عن الغش منسوخ.`, `أن النبي ﷺ أخرج فاعله من الملة.`],
            c: 1,
            e: `ولكن هذا المثال فيه نظر.. فإذا شخص غش من قبيل الجهالة.. ففتح الحقيبة ولم يجد بها جيوب؛ هذا غش.. ينتفي فيه شرط العلم وبذلك لا يصح البيع.`
        },
        {
            t: `المكلف المخاطب بالأمر والنهي أصولياً هو:`,
            o: [`البالغ فقط.`, `العاقل فقط.`, `المسلم البالغ العاقل حصراً بلا استثناء.`, `البالغ العاقل (ويدخل فيه الكفار بفروع الشريعة عند الجمهور).`],
            c: 3,
            e: `الذي يدخل في الخطاب بالأمر والنهي «هو» المكلف، وهو البالغ العاقل.. والتكليف بالأمر والنهي شامل للمسلمين والكفار.`
        },
        {
            t: `صواب أم خطأ: إيجاب الزكاة والحقوق المالية في مال الصغير والمجنون يناقض اشتراط البلوغ والعقل للتكليف.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. ولا يرد على هذا إيجاب الزكاة.. لأن إيجاب هذه مربوط بأسباب معينة متى وجدت ثبت الحكم، فهي منظور فيها إلى السبب لا إلى الفاعل.`
        },
        {
            t: `إذا قلد المجنون أفعال المصلين في المسجد، فعمله:`,
            o: [`يقع باطلاً لعدم قصد الامتثال (النية).`, `يقع صحيحاً وتُكتب له نافلة.`, `يصح بشرط بلوغه.`, `يأثم لانتهاكه حرمة المسجد.`],
            c: 0,
            e: `فالمجنون لو دخل المسجد وقلد الناس في الصلاة.. فهذه الصلاة لا تصح منه لعدم قصد الامتثال؛ لأن ليس له نية في الصلاة.`
        },
        {
            t: `الراجح عند جماهير الأصوليين بشأن مخاطبة الكفار بالتكاليف الشرعية:`,
            o: [`مخاطبون بالعقائد دون فروع الشريعة.`, `مخاطبون بفروع الشريعة دون العقائد.`, `غير مخاطبين بشيء حتى ينطقوا بالشهادتين.`, `مخاطبون بالعقائد (إجماعاً) وبفروع الشريعة (راجحاً).`],
            c: 3,
            e: `الإجماع أن الكفار مخاطبون بالعقائد.. فجماهير الأصوليين قالوا أن الكفار مخاطبون بفروع الشريعة خلافًا للحنفية.`
        },
        {
            t: `الآية التي استُدل بها بقوة على مخاطبة الكفار بفروع الشريعة (كالصلاة):`,
            o: [`{وَمَا مَنَعَهُمْ أَن تُقْبَلَ مِنْهُمْ نَفَقَاتُهُمْ}`],
            c: 1, // Note: I must populate options properly.
            o: [`{وما منعهم أن تقبل منهم نفقاتهم}`, `{ما سلككم في سقر * قالوا لم نك من المصلين}`, `{وقدمنا إلى ما عملوا من عمل}`, `{لئن أشركت ليحبطن عملك}`],
            c: 1,
            e: `فالراجح أنهم مخاطبون بفروع الشريعة، والدليل هو قول الله سبحانه و تعالى: (مَا سَلَكَكُمۡ فِي سَقَرَ.. قَالُواْ لَمۡ نَكُ مِنَ ٱلۡمُصَلِّينَ).`
        },
        {
            t: `إذا قام الكافر بفعل المأمور به (كالصلاة أو النفقة) حال كفره:`,
            o: [`تقع صحيحة كفرع وتُرد كأصل.`, `لا تصح منه وتُرد، لغياب أصل الإيمان المانع للقبول.`, `توقف حتى يُسلم فتُقبل بأثر رجعي.`, `تسقط عنه فريضة الحج فقط.`],
            c: 1,
            e: `لكن الكافر لا يصح منه فعل المأمور به حال كفره.. لقوله تعالى: (وَمَا مَنَعَهُمۡ أَن تُقۡبَلَ مِنۡهُمۡ نَفَقَٰتُهُمۡ إِلَّآ أَنَّهُمۡ كَفَرُواْ).`
        },
        {
            t: `صواب أم خطأ: إذا أسلم الكافر فإنه يؤمر بقضاء كل ما فاته من فروع الشريعة أثناء كفره إبراءً لذمته.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. ولا يؤمر بقضائه إذا أسلم لقوله تعالى: (قُل لِّلَّذِينَ كَفَرُوٓاْ إِن يَنتَهُواْ يُغۡفَرۡ لَهُم مَّا قَدۡ سَلَفَ).`
        },
        {
            t: `تُعرف موانع التكليف في كتب الأصوليين بـ:`,
            o: [`مقاصد المكلفين.`, `موانع الاستجابة.`, `عوارض الأهلية.`, `النواقض الفرعية.`],
            c: 2,
            e: `وهذا عنوان كبير جداً في كتب الأصول، اسمه "عوارض الأهلية" أو "موانع التكليف"، عوارض الأهلية يعني الأشياء التي تعترض كون المكلف مؤهل.`
        },
        {
            t: `الجهل الذي يرفع الحرج والمؤاخذة عن المكلف في ارتكاب محرم (كحديث العهد بالإسلام) هو حصراً:`,
            o: [`الجهل بمقدار العقوبة.`, `الجهل بسوء العاقبة الأخروية.`, `الجهل بتحريم الفعل ذاته.`, `جميع ما سبق يُعذر به المكلف.`],
            c: 2,
            e: `فالجهل: عدم العلم، فمتى فعل المكلف محرماً جاهلاً بتحريمه فلا شيء عليه.. والجهل بسوء العاقبة لا يعذر فيه الإنسان.`
        },
        {
            t: `شخص ارتكب ناقضاً كـ(سب الدين) وهو يعلم أنه حرام ولكنه لا يعلم أنه "كفر مخرج من الملة":`,
            o: [`يُعذر بجهله لعاقبة الفعل.`, `يُكفر، لأن انتهاكه للحرمة مع علمه بالتحريم دليل انتفاء أصل الإيمان من قلبه.`, `تُسقط عنه العقوبة للشبهة.`, `يلزمه التعزير لا الكفر.`],
            c: 1,
            e: `يشترط في تكفيره الجهل بكون سب الدين حرام فقط.. فهذا الفعل مع علمه بأنه حرام دليل على انتفاء أصل الإيمان من قلبه.`
        },
        {
            t: `صواب أم خطأ: المُسيء صلاته عندما ترك الطمأنينة جاهلاً بوجوبها، أمره النبي ﷺ بقضاء كل ما فاته من صلوات.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. "لم يلزمه قضاؤه إذا كان قد فات وقته.. لم يأمره بقضاء ما فات من الصلوات، وإنما أمره بفعل الصلاة الحاضرة على الوجه المشروع".`
        },
        {
            t: `التكييف الأصولي للـ(نسيان) كمانع من موانع التكليف هو:`,
            o: [`تعمد ترك الفعل مع الغفلة.`, `الجهل بأصل الحكم الشرعي.`, `ذهول القلب عن شيء معلوم.`, `القيام بالفعل تحت الإجبار.`],
            c: 2,
            e: `قال رحمه الله: "والنسيان: ذهول القلب عن شيء معلوم، فمتى فعل محرماً ناسياً فلا شيء عليه".`
        },
        {
            t: `من نسي فأكل وهو صائم، أو نسي فترك صلاة:`,
            o: [`الأول يأثم وعليه القضاء، والثاني يلزمه القضاء فوراً.`, `الأول لا شيء عليه لفعله المحرم ناسياً، والثاني يلزمه الأداء متى تذكر.`, `يسقط التكليف عنهما تماماً بلا قضاء.`, `عليهما دفع الفدية لتفريطهما.`],
            c: 1,
            e: `فمتى فعل محرماً ناسياً فلا شيء عليه.. ومتى ترك واجباً ناسياً فلا شيء عليه حال نسيانه؛ ولكن عليه فعله إذا ذكره.`
        },
        {
            t: `صواب أم خطأ: من أُكره على الكفر إكراهاً ملجئاً وقلبه مطمئن بالإيمان، فعليه أن ينطق بالكفر ظاهراً، ثم تجب عليه الكفارة فور زوال الإكراه.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. "فمن أكره على شيء محرم فلا شيء عليه؛ كمن أكره على الكفر وقلبه مطمئن بالإيمان"، فلا توجد كفارة عليه.`
        },
        {
            t: `طلاق السكران يقع في مذهب الأئمة الأربعة استثناءً (رغم كون السكر يذهب العقل)، والعلة الأصولية:`,
            o: [`أن حقوق الزوجة تقدم على حق الله.`, `أنه أسكر وتسبب في زوال عقل نفسه، فألزم بأفعاله عقوبةً له.`, `أن النسيان لا يرفع الطلاق.`, `أن الطلاق من التروك لا الأفعال.`],
            c: 1,
            e: `طلاق السكران يقع في مذهب الأئمة الأربعة؛ لأنه هو الذي تسبب في سُكْر نفسه.. عقوبة له يقع عليه إثم ما يفعل.`
        },
        {
            t: `قاعدة تطبيق (موانع التكليف) على حقوق المخلوقين مقارنة بحقوق الله:`,
            o: [`تسقط الإثم في حق الله وحق المخلوقين معاً بالتساوي.`, `تسقط حقوق المخلوقين بمجرد الجهل أو النسيان دون حاجة لرضاهم.`, `مبنية على العفو في حق الله، أما حقوق المخلوقين فلا تمنع الضمان إلا برضاهم.`, `تضاعف الضمان المالي في حقوق المخلوقين عقوبة.`],
            c: 2,
            e: `وتلك الموانع إنما هي في حق الله؛ لأنه مبني على العفو والرحمة، أما في حقوق المخلوقين فلا تمنع من ضمان ما يجب ضمانه، إذا لم يرض صاحب الحق.`
        },
        {
            t: `صيغة الأمر في قوله تعالى {ذُقۡ إِنَّكَ أَنتَ ٱلۡعَزِيزُ ٱلۡكَرِيمُ} صُرفت عن معناها الأصلي لتفيد معنى:`,
            o: [`الإباحة.`, `التخيير.`, `السخرية.`, `التهكم.`],
            c: 3,
            e: `وقوله تعالى: (ذُقۡ إِنَّكَ أَنتَ ٱلۡعَزِيزُ ٱلۡكَرِيمُ)، فقوله: (ذُقۡ) هذا فعل أمر مباشر.. ولكن المراد به التهكم.`
        },
        {
            t: `صواب أم خطأ: حديث (من أحدث في أمرنا هذا ما ليس فيه فهو رد) يقصر دلالة النهي على التحريم فقط دون التأثير في بطلان أو فساد العمل المنهي عنه.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. بل يُستدل به على أن النهي يقتضي الفساد: "ومن الأدلة على أنه يقتضي الفساد قوله صلّى الله عليه وسلّم: من عمل عملاً...".`
        },
        {
            t: `صواب أم خطأ: الأمر في الآية {فَٱصۡبِرُوٓاْ أَوۡ لَا تَصۡبِرُواْ} خرج إلى معنى الإباحة المطلقة للتسوية بين الفعل والترك.`,
            o: [`صحيحة`, `خاطئة`],
            c: 1,
            e: `العبارة خاطئة. فقد نصت المادة العلمية: "كذلك قوله تعالى: (فَٱصۡبِرُوٓاْ أَوۡ لَا تَصۡبِرُواْ) فالمراد بالأمر هنا السخرية".`
        }
    ];

    let currentQ = 0;
    let isAnswered = false;

    const qTextEle = document.getElementById('q-text');
    const optsContainer = document.getElementById('options-container');
    const explanationEle = document.getElementById('q-explanation');
    const currentNumEle = document.getElementById('current-q-num');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    function loadQuestion() {
        isAnswered = false;
        const q = questions[currentQ];
        currentNumEle.innerText = currentQ + 1;
        qTextEle.innerText = q.t;
        
        optsContainer.innerHTML = '';
        explanationEle.style.display = 'none';

        q.o.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectOption(idx, q.c, div);
            optsContainer.appendChild(div);
        });

        btnPrev.disabled = currentQ === 0;
        btnNext.disabled = currentQ === questions.length - 1;
    }

    function selectOption(selectedIdx, correctIdx, element) {
        if (isAnswered) return;
        isAnswered = true;

        const optionsDivs = optsContainer.getElementsByClassName('option');
        
        if (selectedIdx === correctIdx) {
            element.style.backgroundColor = '#d4edda';
            element.style.borderColor = '#c3e6cb';
            element.style.color = '#155724';
        } else {
            element.style.backgroundColor = '#fff3cd';
            element.style.borderColor = '#ffeeba';
            element.style.color = '#856404';
            
            optionsDivs[correctIdx].style.backgroundColor = '#d4edda';
            optionsDivs[correctIdx].style.borderColor = '#c3e6cb';
            optionsDivs[correctIdx].style.color = '#155724';
        }

        explanationEle.innerHTML = `<strong>التفسير والتأصيل:</strong> ${questions[currentQ].e}`;
        explanationEle.style.display = 'block';
    }

    function goNext() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            loadQuestion();
        }
    }

    function goPrev() {
        if (currentQ > 0) {
            currentQ--;
            loadQuestion();
        }
    }

    window.onload = loadQuestion;
</script>
</body>
</html>
