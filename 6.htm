<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار متقدم: أسس الكلام والحقائق اللغوية</title>
    <style>
        :root {
            --correct-bg: #d4edda;
            --correct-border: #28a745;
            --wrong-bg: #fff3cd;
            --wrong-border: #ffc107;
            --primary: #0056b3;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: var(--primary); }
        .progress { font-weight: bold; margin-bottom: 15px; color: #555; }
        .question-text { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .option:hover { background-color: #f1f1f1; }
        .option.correct { background-color: var(--correct-bg); border-color: var(--correct-border); font-weight: bold; color: #155724; }
        .option.wrong { background-color: var(--wrong-bg); border-color: var(--wrong-border); color: #856404; }
        .option.disabled { pointer-events: none; opacity: 0.8; }
        .explanation { display: none; margin-top: 20px; padding: 15px; background: #e9ecef; border-right: 5px solid var(--primary); border-radius: 5px; font-size: 1.05rem; line-height: 1.6; }
        .navigation { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn { padding: 10px 25px; font-size: 1.1rem; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #fff; transition: 0.3s; }
        .btn-prev { background-color: #6c757d; }
        .btn-prev:hover { background-color: #5a6268; }
        .btn-next { background-color: var(--primary); }
        .btn-next:hover { background-color: #004494; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .score-screen { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div class="header">
        <h1>اختبار الفهم الشامل (أسس الكلام والحقائق الأصولية)</h1>
    </div>
    
    <div id="quiz-content">
        <div class="progress" id="progress">السؤال 1 من 50</div>
        <div class="question-text" id="q-text"></div>
        <div class="options" id="options"></div>
        <div class="explanation" id="explanation"></div>
        
        <div class="navigation">
            <button class="btn btn-prev" id="btn-prev" onclick="changeQuestion(-1)">السابق</button>
            <button class="btn btn-next" id="btn-next" onclick="changeQuestion(1)" disabled>التالي</button>
        </div>
    </div>

    <div class="score-screen" id="score-screen">
        <h2 style="color: var(--correct-border);">تم إنهاء الاختبار بنجاح!</h2>
        <p>يمكنك إعادة تحميل الصفحة لإجراء الاختبار مرة أخرى.</p>
    </div>
</div>

<script>
    const questions = [
        // القسم الأول: اختيار من متعدد (25 سؤال)
        {
            q: "أي العبارات التالية تعتبر صحيحة أصولياً فيما يخص التفريق بين 'الكلام' و'الكلمة' بناءً على المحاضرة؟",
            options: ["الكلمة هي القول المفيد بذاته.", "الكلام مفرده كلمة، والكلمة توضع لمعنى مركب.", "الكلام هو اللفظ الموضوع لمعنى، والكلمة للفظ الموضوع لمعنى مفرد.", "لا يوجد فرق اصطلاحي بينهما في لسان العرب."],
            ans: 2,
            exp: "التفسير: ذكر المصنف أن الكلام هو اللفظ الموضوع لمعنى، بينما الكلمة هي اللفظ الموضوع لمعنى مفرد مثل (زيد) بخلاف (قام زيد)."
        },
        {
            q: "عندما يقول المتكلم: 'أكرمتُ طالباً'، فإن لفظ (طالباً) هنا يفيد:",
            options: ["العموم الاستغراقي.", "الإطلاق في الجنس الواحد لعدم تقييده.", "الخصوص لتحديد طالب واحد.", "الاستغراق والخصوص معاً."],
            ans: 1,
            exp: "التفسير: (طالباً) نكرة في سياق الإثبات، وتفيد الإطلاق، أي أطلق ولم يحدد مقيداً، وهو يختلف عن العموم."
        },
        {
            q: "جميع الأفعال الآتية تفيد الإطلاق ولا تفيد العموم بذاتها، ما عدا:",
            options: ["الفعل الماضي.", "الفعل المضارع.", "فعل الأمر.", "لا شيء مما سبق، فجميعها لا تفيد العموم."],
            ans: 3,
            exp: "التصويب: لا شيء مما سبق. الفعل بأقسامه الثلاثة (ماض، مضارع، أمر) يفيد الإطلاق فلا عموم له كما نص المصنف."
        },
        {
            q: "من أبرز الكتب المتخصصة في 'علم حروف المعاني' والتي ذكرها المحاضر جميع ما يلي ما عدا:",
            options: ["الجنى الداني للمرادي.", "رصف المباني للمالقي.", "ارتشاف الضرب لأبي حيان.", "مغني اللبيب لابن هشام."],
            ans: 2,
            exp: "التفسير: كتاب (ارتشاف الضرب) ذُكر ضمن المطولات التي تناولت شروح الكلام ولم يُذكر ككتاب مفرد مخصص حصراً لحروف المعاني كالبقية."
        },
        {
            q: "في قولنا 'جاء زيد فعمرو'، وفي قوله تعالى {فطال عليهم الأمد فقست قلوبهم}، الفاء على التوالي تفيد:",
            options: ["السببية / الجمع المطلق.", "الترتيب والتراخي / السببية.", "الترتيب والتعقيب / السببية.", "الجمع / الإباحة."],
            ans: 2,
            exp: "التفسير: الفاء في (جاء زيد فعمرو) تفيد الترتيب والتعقيب المباشر، بينما في الآية تفيد السببية (قست بسبب طول الأمد)."
        },
        {
            q: "حدد الإجابة الخاطئة بشأن معاني 'اللام الجارة':",
            options: ["لام الإباحة: مثل 'لفلان أن يفعل كذا' وهو معنى توقف فيه المحاضر.", "لام التمليك: نحو 'هذه لزيد'.", "لام التعليل: كقوله {ليدبروا آياته}.", "لام الملك: كقوله {ولله ملك السماوات والأرض} لأن الله يُملّك عباده."],
            ans: 3,
            exp: "التصويب: الإجابة الخاطئة هي الرابعة، لأن لام المُلك تُعطى لله لأنه مالكها أصلاً وليس لأنه 'يُملّك' عباده."
        },
        {
            q: "أي من الآيات الكريمة التالية ضُمّنت حرف (على) ليفيد الاستعلاء المجازي؟",
            options: ["{الرحمن على العرش استوى}", "{عليهم لعنة الله}", "{وعلى الذين يطيقونه فدية}", "الإجابة (2) + (3)"],
            ans: 3,
            exp: "التفسير: اللعنة استعلاء مجازي غير محسوس (2)، والوجوب في (يطيقونه) عده المحاضر أيضاً من باب الاستعلاء المجازي (3)."
        },
        {
            q: "يُقسّم الخبر من حيث المخبر به إلى أقسام. أي من الأخبار الآتية يستحيل عقلاً ولا يوصف بالصدق؟",
            options: ["ادعاء مسيلمة الكذاب للنبوة.", "قول القائل: هذا الجسم متحرك ساكن في نفس اللحظة.", "إخبار ثقة بقدوم غائب.", "إخبار رجل بهطول المطر صيفاً."],
            ans: 1,
            exp: "التفسير: ادعاء مسيلمة مستحيل (شرعاً)، بينما اجتماع النقيضين (متحرك ساكن) هو المستحيل (عقلاً)."
        },
        {
            q: "الآية التي سيقت بصيغة (الأمر) ولكن المراد بها (الخبر) لتنزيل المخبر عنه منزلة الملزم به، هي:",
            options: ["{والمطلقات يتربصن بأنفسهن}", "{أسمع بهم وأبصر}", "{ولنحمل خطاياكم}", "{الحمد لله رب العالمين}"],
            ans: 2,
            exp: "التفسير: {ولنحمل} جاءت بصورة الأمر (بلام الأمر) والمراد بها الخبر (ونحن نحمل خطاياكم) تنزيلاً للمخبر عنه منزلة المفروض."
        },
        {
            q: "عند الرد على شبهة النصارى في نصب (الظالمين) في قوله تعالى {إنه لا يفلح الظالمون}، المخرج الأصولي والنحوي هو:",
            options: ["الضمير في (إنه) يعود على الله، والظالمون مفعول به.", "الضمير في (إنه) ضمير الشأن، والظالمون فاعل.", "الضمير ضمير قصة يعود على الظالمين.", "الظالمون مبتدأ مؤخر."],
            ans: 1,
            exp: "التفسير: الضمير هنا يسمى (ضمير الشأن) لا يعود على الله، والتقدير: الشأن أنه لا يفلح الظالمون (فاعل مرفوع)."
        },
        {
            q: "من أمثلة الحقيقة العرفية (الخاصة) التي تقابل الحقيقة اللغوية والعرفية العامة:",
            options: ["الدابة لذوات الأربع.", "الصلاة بمعنى الدعاء.", "مصطلحات أهل الأصول والمنطق والفلسفة.", "جميع ما سبق."],
            ans: 2,
            exp: "التفسير: العرفية الخاصة تختص بأهل العلم كالأصوليين، بخلاف العرفية العامة (كالدابة) التي تشمل عوام الناس."
        },
        {
            q: "ما موقف الإمام الشوكاني إذا ورد لفظ له مسمى لغوي ومسمى شرعي كالصلاة في القرآن؟",
            options: ["يُعتبر اللفظ مجملاً ويُتوقف فيه.", "يُحمل على المعنى اللغوي لسبقه الزمني.", "يُحمل على المعنى الشرعي لأن الشرع طارئ وناسخ للغة.", "تُرجح القرينة السياقية بالتساوي."],
            ans: 2,
            exp: "التفسير: نص الشوكاني على أنه لا إجمال، بل يجب الحمل على المعنى الشرعي لأنه ناسخ للمتأخر والنبي بُعث لبيان الشرعيات."
        },
        {
            q: "الكتاب الذي وصفه المحاضر بأنه لخص كلام ابن حجر في فتح الباري وكلام النووي في شرح مسلم هو:",
            options: ["إرشاد الفحول.", "نيل الأوطار.", "فتح القدير.", "مغني اللبيب."],
            ans: 1,
            exp: "التفسير: كتاب (نيل الأوطار) للشوكاني هو الذي لخص فيه فوائد فتح الباري وشرح مسلم وشرح سنن أبي داود."
        },
        {
            q: "التجوز في قولنا (أنبت المطر العشب) يُصنف ضمن المجاز:",
            options: ["المرسل بالتجوز في الكلمات.", "العقلي بالتجوز في الإسناد.", "المرسل بإطلاق الجزء على الكل.", "الاستعارة التبعية."],
            ans: 1,
            exp: "التفسير: الكلمات حقيقية، لكن إسناد فعل الإنبات للمطر (وهو سبب) مجاز عقلي، لأن المنبت الحقيقي هو الله."
        },
        {
            q: "أي الآيات الكريمة التالية تُمثّل المجاز المرسل بعلاقة (إطلاق الكل وإرادة الجزء)؟",
            options: ["{فتحرير رقبة مؤمنة}", "{جعلوا أصابعهم في آذانهم}", "{ويوم يعض الظالم على يديه}", "الإجابة (2) + (3)"],
            ans: 3,
            exp: "التفسير: إدخال الأصابع، وعض اليدين كلاهما مستحيل كلياً، فالمقصود إدخال الأنامل وعض جزء من اليد، فأطلق الكل وأراد الجزء."
        },
        {
            q: "العالم الذي انتصر له ابن تيمية وابن القيم في القول بعدم وجود مجاز في اللغة أصلاً هو:",
            options: ["أبو علي الفارسي.", "الكيا الهراس.", "أبو إسحاق الإسفراييني.", "تاج الدين السبكي."],
            ans: 2,
            exp: "التفسير: القول بإنكار المجاز في اللغة اختاره أبو إسحاق الإسفراييني، وانتصر له ابن تيمية وابن القيم والشنقيطي."
        },
        {
            q: "مذهب البصريين في قوله تعالى {عيناً يشرب بها عباد الله} يعتمد على:",
            options: ["قاعدة تناوب الحروف (الباء بمعنى من).", "قاعدة التضمين (تضمين الفعل معنى يرتوي).", "الحقيقة العرفية للقرآن.", "استعمال الباء زائدة للتوكيد."],
            ans: 1,
            exp: "التفسير: البصريون أحكم وأتقن في القرآن حيث قالوا بـ (التضمين) أي يشرب ويرتوي بها، بخلاف الكوفيين الذين قالوا بالتناوب."
        },
        {
            q: "إذا استعملت صيغ العقود (كـ: بعت وقبلت) فإنها تُعتبر:",
            options: ["خبراً لفظاً ومعنى.", "إنشاءً لفظاً ومعنى.", "خبراً باعتبار ما في نفس العاقد، وإنشاءً باعتبار ترتب العقد عليها.", "لا يمكن تحديدها إلا بالقرينة."],
            ans: 2,
            exp: "التفسير: العقود خبرية من حيث الإخبار بما في النفس، وإنشائية من حيث إنشاء أثر العقد وانتقال الملك."
        },
        {
            q: "جميع ما يلي يعد من صيغ الإنشاء التي لا تحتمل الصدق والكذب لذاتها، ما عدا:",
            options: ["أسلوب الرجاء.", "أسلوب الاستفهام.", "الإخبار عن المستحيل عقلاً.", "أسلوب التعجب والإنكار."],
            ans: 2,
            exp: "التفسير: الإخبار عن المستحيل عقلاً (كمتحرك ساكن) هو من أقسام 'الخبر' (الذي لا يوصف بالصدق) وليس من أقسام الإنشاء."
        },
        {
            q: "الآية {فإنها لا تعمى الأبصار} تشتمل على ضمير (ها) الذي يدرأ الشبهات النحوية، ويُسمى:",
            options: ["ضمير الشأن.", "ضمير القصة.", "ضمير الفصل.", "ضمير المخاطب."],
            ans: 1,
            exp: "التفسير: سمي بضمير القصة (أي القصة والحقيقة أن الأبصار لا تعمى) ولذلك جاءت (الأبصار) فاعلاً مرفوعاً."
        },
        {
            q: "يشترط لصحة حمل اللفظ على مجازه توافر:",
            options: ["قرينة مانعة من الحقيقة، وعلاقة مسوغة.", "عموم واستغراق.", "تضمين وتناوب.", "حقيقة لغوية وشرعية متطابقتان."],
            ans: 0,
            exp: "التفسير: ذكر المصنف أنه لا بد من (قرينة) تمنع إرادة الحقيقة، و(علاقة) بين المعنيين (كالمشابهة أو غيرها)."
        },
        {
            q: "أي الآيات الآتية استخدمت للتجوز بالزيادة (مجاز مرسل بالزيادة)؟",
            options: ["{واسأل القرية}", "{ليس كمثله شيء}", "{وصَلِّ عليهم إن صلاتك سكن لهم}", "{أنبت المطر العشب}"],
            ans: 1,
            exp: "التفسير: زيدت الكاف في {ليس كمثله شيء} لتأكيد نفي المثل عن الله، وهو مجاز بزيادة الحرف."
        },
        {
            q: "عندما أورد المحاضر قوله تعالى {واسأل القرية} كمثال للمجاز بالحذف، استدرك عليه بأن:",
            options: ["العرب لم تستخدم هذا الأسلوب قط.", "هذا مجاز بالزيادة وليس بالحذف.", "المحققون يرون فيه نظراً؛ لأن اللفظ انتقل لمعنى استعمالي حقيقي ولا يستحضر العربي الجدران.", "المجاز فيه عقلي وليس مرسلاً."],
            ans: 2,
            exp: "التفسير: المحققون يرون أن العربي حين يقول اسأل القرية لا يستحضر حذف (أهل) بل صار اللفظ مستعملاً استعمالاً حقيقياً في القاطنين."
        },
        {
            q: "مقولة 'ومن سلم وقال: لا أسميه مجازاً، فهو نزاع في عبارة لا فائدة في المشاحة فيه' قائلها هو:",
            options: ["ابن جني.", "الكيا الهراس.", "ابن قدامة في روضة الناظر.", "الشوكاني."],
            ans: 2,
            exp: "التفسير: العبارة للإمام ابن قدامة في روضة الناظر يقرر فيها أن الخلاف في تسمية المجاز هو خلاف لفظي لا مشاحة فيه."
        },
        {
            q: "في علوم البلاغة الثلاثة (البيان، المعاني، البديع)، يندرج مبحث (الحقيقة والمجاز) ضمن علم:",
            options: ["المعاني.", "البيان.", "البديع.", "العروض."],
            ans: 1,
            exp: "التفسير: نص المحاضر على أن الحقيقة والمجاز والمجاز المرسل هي من صميم علم (البيان)."
        },

        // القسم الثاني: أسئلة صح وخطأ (25 سؤال) صياغة تقريرية
        {
            q: "هذه العبارة: الكلمة اصطلاحاً هي اللفظ الموضوع لمعنى مفرد كـ (زيد)، والكلام هو اللفظ الموضوع لمعنى كـ (قام زيد).",
            options: ["1- صحيحة", "2- خاطئة"],
            ans: 0,
            exp: "التصويب: عبارة صحيحة، فالمفرد كلمة، والمركب كلام مفيد."
        },
        {
            q: "هذه العبارة: النكرة في سياق الإثبات، إذا لم تُقيّد بقيد، فإنها تفيد العموم الاستغراقي.",
            options: ["1- صحيحة", "2- خاطئة"],
            ans: 1,
            exp: "التصويب: خاطئة. النكرة في سياق الإثبات تفيد (الإطلاق) في الجنس الواحد ولا تفيد العموم."
        },
        {
            q: "هذه العبارة: الأفعال في اللغة العربية بأقسامها الثلاثة تفيد الإطلاق ولا تدل على العموم بذاتها.",
            options: ["1- صحيحة", "2- خاطئة"],
            ans: 0,
            exp: "التصويب: صحيحة. الفعل (فهم، يفهم، افهم) يفيد مطلق الفهم بلا قيد ولا يعم."
        },
        {
            q: "هذه العبارة: حرف العطف (الواو) يدل دائماً على الترتيب والتعقيب المباشر بين المتعاطفين.",
            options: ["1- صحيحة", "2- خاطئة"],
            ans: 1,
            exp: "التصويب: خاطئة. الواو لمطلق الجمع ولا تقتضي الترتيب ولا تنافيه، الفاء هي التي تفيد التعقيب."

    let currentQuestion = 0;
    let answered = false;

    function initQuiz() {
        showQuestion(currentQuestion);
    }

    function showQuestion(index) {
        answered = false;
        const qData = questions[index];
        
        document.getElementById('progress').innerText = `السؤال ${index + 1} من ${questions.length}`;
        document.getElementById('q-text').innerText = (index + 1) + ". " + qData.q;
        document.getElementById('explanation').style.display = 'none';
        
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';
        
        qData.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => selectAnswer(div, i, qData.ans, qData.exp);
            optionsContainer.appendChild(div);
        });

        document.getElementById('btn-prev').disabled = index === 0;
        document.getElementById('btn-next').disabled = true;
    }

    function selectAnswer(selectedDiv, selectedIndex, correctIndex, explanationText) {
        if (answered) return;
        answered = true;

        const options = document.querySelectorAll('.option');
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (i === correctIndex) {
                opt.classList.add('correct');
            } else if (i === selectedIndex) {
                opt.classList.add('wrong');
            }
        });

        const expDiv = document.getElementById('explanation');
        expDiv.innerText = explanationText;
        expDiv.style.display = 'block';

        const btnNext = document.getElementById('btn-next');
        btnNext.disabled = false;
        if (currentQuestion === questions.length - 1) {
            btnNext.innerText = "إنهاء الاختبار";
        } else {
            btnNext.innerText = "التالي";
        }
    }

    function changeQuestion(step) {
        currentQuestion += step;
        if (currentQuestion >= questions.length) {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('score-screen').style.display = 'block';
        } else {
            showQuestion(currentQuestion);
        }
    }

    window.onload = initQuiz;
