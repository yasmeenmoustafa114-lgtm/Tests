    function initQuiz() {
        quizData.forEach((qData, index) => {
            const qBox = document.createElement('div');
            qBox.className = 'question-box';
            if(index === 0) qBox.classList.add('active');
            qBox.id = `q-${index}`;

            const qType = document.createElement('span');
            qType.className = 'q-type-badge';
            qType.innerText = qData.type === 'MCQ' ? 'اختيار من متعدد' : 'صح أم خطأ';
            qBox.appendChild(qType);

            const qTitle = document.createElement('div');
            qTitle.className = 'question-text';
            qTitle.innerText = `${index + 1}. ${qData.question}`;
            qBox.appendChild(qTitle);

            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';

            qData.options.forEach((opt) => {
                const optEl = document.createElement('div');
                optEl.className = 'option';
                optEl.innerText = opt.text;
                optEl.dataset.correct = opt.correct;
                
                optEl.onclick = function() {
                    handleSelection(optEl, optionsContainer, qData.explanation);
                };
                optionsContainer.appendChild(optEl);
            });
            qBox.appendChild(optionsContainer);

            const expBox = document.createElement('div');
            expBox.className = 'explanation-box';
            expBox.innerHTML = `<span class="explanation-title">📝 التفسير من المصدر:</span> ${qData.explanation}`;
            qBox.appendChild(expBox);

            questionsWrapper.appendChild(qBox);
        });
        updateNav();

        const isCorrect = selectedEl.dataset.correct === "true";

        if(isCorrect) {
            selectedEl.classList.add('correct');
        } else {
            selectedEl.classList.add('wrong');
            // Highlight the correct one
            allOptions.forEach(el => {
                if(el.dataset.correct === "true") {
                    el.classList.add('correct');
                }
            });
        }
        
        // Show explanation
        const expBox = container.parentElement.querySelector('.explanation-box');
        expBox.style.display = 'block';
    }

    function updateNav() {
        prevBtn.disabled = currentQuestionIndex === 0;
        nextBtn.disabled = currentQuestionIndex === quizData.length - 1;
        progressText.innerText = `السؤال ${currentQuestionIndex + 1} من ${quizData.length}`;
        
        document.querySelectorAll('.question-box').forEach((box, index) => {
            if(index === currentQuestionIndex) {
                box.classList.add('active');
            } else {
                box.classList.remove('active');
            }
        });
    }

    function nextQuestion() {
        if(currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            updateNav();
        }
    }

    function prevQuestion() {
        if(currentQuestionIndex > 0) {
            currentQuestionIndex--;
            updateNav();
        }
    }

    window.onload = initQuiz;

</script>
</body>
</html>
