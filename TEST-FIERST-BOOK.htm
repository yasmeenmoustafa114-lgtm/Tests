<html lang="en">
<head>

    <style>
        :root {
            --primary: #2c3e50;
            --success: #28a745;
            --error: #ffc107;
            --warning: #ff9800;
            --highlight: #e67e22;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
            direction: ltr;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2, h3 { color: var(--primary); text-align: center; }
        .section { display: none; animation: fadeIn 0.5s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .arabic-text {
            font-family: 'Amiri', 'Traditional Arabic', serif;
            font-size: 1.8rem;
            direction: rtl;
            text-align: right;
            line-height: 2.2;
            margin-bottom: 15px;
        }
        .highlight-word { color: var(--highlight); font-weight: bold; }
        
        /* Vocabulary Table */
        details { margin-bottom: 20px; background: #eef2f5; padding: 10px; border-radius: 5px; }
        summary { cursor: pointer; font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; direction: rtl; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; font-family: 'Amiri', serif; font-size: 1.4rem; }
        th { background-color: var(--primary); color: white; }
        
        /* Questions */
        .question-block { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-option {
            padding: 12px; font-size: 1.5rem; font-family: 'Amiri', serif; direction: rtl;
            background: #fff; border: 2px solid var(--primary); border-radius: 5px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-option:hover:not(:disabled) { background: #eef2f5; }
        .btn-option:disabled { cursor: not-allowed; }
        
        /* Sentence Ordering */
        .word-pool { display: flex; flex-wrap: wrap; gap: 10px; direction: rtl; justify-content: flex-start; margin-bottom: 10px; }
        .word-btn {
            padding: 10px 15px; font-size: 1.5rem; font-family: 'Amiri', serif;
            background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        .answer-box {
            min-height: 60px; border: 2px dashed #ccc; border-radius: 5px; padding: 10px;
            display: flex; flex-wrap: wrap; gap: 10px; direction: rtl; justify-content: flex-start;
            background: #fafafa; transition: 0.3s;
        }
        
        /* General Buttons */
        .nav-btn {
            display: block; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold;
            background: var(--primary); color: white; border: none; border-radius: 5px;
            cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .nav-btn:hover { background: #1a252f; }
        
        /* Dropdowns */
        select { font-size: 1.5rem; font-family: 'Amiri', serif; padding: 5px; direction: rtl; }
        
        /* Textarea */
        textarea { width: 100%; height: 150px; font-size: 1.5rem; font-family: 'Amiri', serif; direction: rtl; padding: 10px; border-radius: 5px; resize: vertical;}
        .teacher-note { color: #7f8c8d; font-style: italic; font-size: 0.9rem; }
        
        /* Result */
        #result-screen { text-align: center; }
        .score-text { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 20px 0; direction: rtl; font-family: 'Amiri', serif;}
    </style>
</head>

/**
 * -------------------------------------------------------------
 * Application Logic
 * -------------------------------------------------------------
 */

let currentSectionIdx = 0;
let totalScore = 0;
let maxScore = 100; // 110 total questions - 10 writing = 100 auto-graded.

function initApp() {
    const app = document.getElementById('app');
    
    testData.forEach((sec, sIdx) => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = `section ${sIdx === 0 ? 'active' : ''}`;
        sectionDiv.id = `section-${sIdx}`;
        
        let html = `<h2>${sec.title}</h2>
                    <p class="arabic-text" style="color: var(--primary); font-weight: bold;">${sec.instructions}</p>
                    ${sec.contentHtml}`;
                    
        sec.questions.forEach((qObj, qIdx) => {
            html += buildQuestionHTML(sec.id, qObj, sIdx, qIdx);
        });
        
        if (sIdx < testData.length - 1) {
            html += `<button class="nav-btn" onclick="nextSection(${sIdx})">Next Section</button>`;
        } else {
            html += `<button class="nav-btn" style="background-color: var(--success);" onclick="showResult()">Finish Test & Show Result</button>`;
        }
        
        sectionDiv.innerHTML = html;
        app.appendChild(sectionDiv);
    });
    
    // Result Screen
    const resultDiv = document.createElement('div');
    resultDiv.className = 'section';
    resultDiv.id = 'result-screen';
    resultDiv.innerHTML = `
        <h2>Test Complete</h2>
        <p class="score-text" id="final-score-text"></p>
        <button class="nav-btn" onclick="location.reload()">Retake Test</button>
    `;
    app.appendChild(resultDiv);
}

function buildQuestionHTML(secId, qObj, sIdx, qIdx) {
    const { type } = qObj;
    let qHTML = `<div class="question-block" id="q-${sIdx}-${qIdx}">`;
    
    if (type === 'mcq') {
        const { q: questionText, opts } = qObj;
        qHTML += `<p class="arabic-text">${qIdx + 1}. ${questionText}</p><div class="options">`;
        opts.forEach((opt, optIdx) => {
            qHTML += `<button class="btn-option" onclick="handleMCQ(this, ${sIdx}, ${qIdx}, ${optIdx})">${opt}</button>`;
        });
        qHTML += `</div>`;
    } 
    else if (type === 'dropdown') {
        const { textPre, textPost, opts } = qObj;
        qHTML += `<p class="arabic-text" style="display: flex; align-items: center; justify-content: flex-start; gap: 10px; flex-wrap: wrap;">
            <span>${qIdx + 1}. ${textPre}</span>
            <select onchange="handleDropdown(this, ${sIdx}, ${qIdx})">
                <option value="-1" disabled selected>اخْتَارِي...</option>`;
        opts.forEach((opt, optIdx) => {
            qHTML += `<option value="${optIdx}">${opt}</option>`;
        });
        qHTML += `</select><span>${textPost}</span></p>`;
    }
    else if (type === 'order') {
        const { words } = qObj;
        // Shuffle words for presentation
        let shuffled = [...words].sort(() => Math.random() - 0.5);
        qHTML += `<p class="arabic-text">${qIdx + 1}. رَتِّبِي الْكَلِمَاتِ:</p>
                  <div class="word-pool" id="pool-${sIdx}-${qIdx}">`;
        shuffled.forEach((w, wIdx) => {
            qHTML += `<button class="word-btn" id="wb-${sIdx}-${qIdx}-${wIdx}" onclick="handleOrderClick('${w}', '${sIdx}', '${qIdx}', this.id)">${w}</button>`;
        });
        qHTML += `</div><div class="answer-box" id="ansbox-${sIdx}-${qIdx}"></div>`;
        
        // Store expected answer logic locally in DOM for quick access
        setTimeout(() => {
            document.getElementById(`ansbox-${sIdx}-${qIdx}`).dataset.expected = JSON.stringify(qObj.ans);
            document.getElementById(`ansbox-${sIdx}-${qIdx}`).dataset.current = '[]';
        }, 100);
    }
    else if (type === 'textarea') {
        const { placeholder } = qObj;
        qHTML += `<textarea placeholder="${placeholder}"></textarea>`;
    }
    
    qHTML += `</div>`;
    return qHTML;
}

// Handlers
function handleMCQ(btn, sIdx, qIdx, selectedOptIdx) {
    const container = btn.parentElement;
    const buttons = container.querySelectorAll('.btn-option');
    buttons.forEach(b => b.disabled = true);
    
    const correctIdx = testData[sIdx].questions[qIdx].a;
    
    if (selectedOptIdx === correctIdx) {
        btn.style.backgroundColor = 'var(--success)';
        btn.style.color = 'white';
        totalScore++;
    } else {
        btn.style.backgroundColor = 'var(--error)';
    }
}

function handleDropdown(selectEl, sIdx, qIdx) {
    selectEl.disabled = true;
    const selectedOptIdx = parseInt(selectEl.value);
    const correctIdx = testData[sIdx].questions[qIdx].a;
    
    if (selectedOptIdx === correctIdx) {
        selectEl.style.backgroundColor = 'var(--success)';
        selectEl.style.color = 'white';
        totalScore++;
    } else {
        selectEl.style.backgroundColor = 'var(--error)';
    }
}

function handleOrderClick(word, sIdx, qIdx, btnId) {
    const pool = document.getElementById(`pool-${sIdx}-${qIdx}`);
    const ansBox = document.getElementById(`ansbox-${sIdx}-${qIdx}`);
    const btn = document.getElementById(btnId);
    
    if (btn.parentElement === pool) {
        ansBox.appendChild(btn);
    } else {
        pool.appendChild(btn);
    }
    
    // Check state
    const currentWords = Array.from(ansBox.children).map(b => b.innerText);
    const expectedWords = JSON.parse(ansBox.dataset.expected);
    
    if (currentWords.length === expectedWords.length) {
        let isCorrect = currentWords.every((val, index) => val === expectedWords[index]);
        if (isCorrect) {
            ansBox.style.borderColor = 'var(--success)';
            ansBox.style.backgroundColor = '#e8f5e9';
            Array.from(ansBox.children).forEach(b => b.disabled = true);
            totalScore++;
        } else {
            ansBox.style.backgroundColor = 'var(--warning)';
            ansBox.style.borderColor = 'var(--error)';
            setTimeout(() => {
                ansBox.style.backgroundColor = '#fafafa';
                ansBox.style.borderColor = '#ccc';
                // move all back
                Array.from(ansBox.children).forEach(b => pool.appendChild(b));
            }, 1000);
        }
    }
}

function nextSection(currentId) {
    document.getElementById(`section-${currentId}`).classList.remove('active');
    document.getElementById(`section-${currentId + 1}`).classList.add('active');
    window.scrollTo(0, 0);
}

function showResult() {
    document.querySelector('.section.active').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    
    document.getElementById('final-score-text').innerText = `اكتمل الاختبار! الدرجة: ${totalScore} / 100. أحسنتِ إتمام الاختبار التجريبي.`;
    window.scrollTo(0, 0);
}

// Initialize
window.onload = initApp;

</script>
