    <style>
        :root {

            --secondary-color: #2563eb;

            --wrong-color: #f1c40f; 
            --bg-color: #f0fdf4;
            --text-color: #1f2937;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 850px;
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 2em;
        }

        .progress {
            font-size: 1.2em;
            font-weight: 700;
            color: #4b5563;
            background: #e5e7eb;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .question-box {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #111827;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8fafc;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            padding: 15px 20px;
            font-size: 1.25em;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: right;
            color: var(--text-color);
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e2e8f0;
            border-color: #94a3b8;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-color) !important;
            color: #ffffff !important;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: #d4ac0d !important;
            color: #000000 !important;
            font-weight: bold;
        }

        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background-color: #f0fdf4;
            border-right: 6px solid var(--correct-color);
            display: none;
            line-height: 1.7;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .feedback-box h3 {
            margin-top: 0;
            color: var(--correct-color);
            font-size: 1.3em;
        }

        .feedback-text {
            font-size: 1.15em;
            font-weight: 500;
        }

        .citation {
            margin-top: 15px;
            font-weight: bold;
            color: #6b7280;
            font-size: 1em;
            background: #e5e7eb;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }

            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: var(--secondary-color);
        }

        .nav-btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>

    const citationText = document.getElementById('citation-text');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressText = document.getElementById('progress-text');

    function loadQuestion(index) {
        selectedAnswer = false;
        feedbackBox.style.display = 'none';
        
        const currentQ = questions[index];
        questionTextElement.innerText = currentQ.question;
        progressText.innerText = `السُّؤَالُ ${index + 1} مِنْ ${questions.length}`;

        optionsContainer.innerHTML = '';

        currentQ.options.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = () => checkAnswer(i, btn, currentQ);
            optionsContainer.appendChild(btn);
        });

        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === questions.length - 1;
    }

    function checkAnswer(selectedIndex, btnElement, currentQ) {
        if (selectedAnswer) return; 
        selectedAnswer = true;

        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQ.correctIndex) {
            btnElement.classList.add('correct');
        } else {
            btnElement.classList.add('wrong');
            allButtons[currentQ.correctIndex].classList.add('correct');
        }

        feedbackText.innerText = currentQ.explanation;
        citationText.innerText = `[الْمَصْدَرُ مِنْ نَصِّ الْمَحَاضِرَةِ التَّاسِعَةِ: ${currentQ.citation}]`;
        feedbackBox.style.display = 'block';
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    loadQuestion(currentQuestionIndex);
