<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الترويح عن النفس - Тест: Отдых</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-color: #f4f9f4;
            --section-bg: #ffffff;
            --text-color: #333;
            --correct: #c8e6c9;
            --incorrect: #ffcdd2;
            --highlight: #FFE4B5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1, h2, h3 { text-align: center; color: var(--primary); }
        .ru-title { font-size: 0.8em; color: #666; display: block; text-align: center; margin-bottom: 20px;}
        
        .section {
            background: var(--section-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .question-card {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin-bottom: 10px;
        }
        .question-text { font-weight: bold; margin-bottom: 15px; color: #1565c0; font-size: 1.15em;}
        
        .options-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .btn-option {
            background-color: #e3f2fd;
            border: 2px solid #bbdefb;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.2s;
            flex-grow: 1;
            text-align: center;
        }
        .btn-option:hover:not(:disabled) { background-color: #bbdefb; }
        .btn-option:disabled { cursor: not-allowed; opacity: 0.8; color: #333;}
        
        .correct { background-color: var(--correct) !important; border-color: #81c784 !important; }
        .incorrect { background-color: var(--incorrect) !important; border-color: #e57373 !important; }
        
        /* Story and Vocab Table Layout */
        .story-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .story-text { background: #fffde7; padding: 25px; border-radius: 8px; font-size: 1.25em; line-height: 2.2; border: 1px solid #fff59d; text-align: justify;}
        .highlight { background-color: var(--highlight); padding: 0 5px; border-radius: 4px; font-weight: bold; display: inline-block; color: #d84315;}
        
        details { background: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px solid #c8e6c9; cursor: pointer; }
        summary { font-weight: bold; color: #2e7d32; font-size: 1.1em; outline: none; }
        
        .vocab-table { width: 100%; border-collapse: collapse; font-size: 0.95em; margin-top: 15px; background: #fff;}
        .vocab-table th, .vocab-table td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        .vocab-table th { background-color: #c8e6c9; color: #1b5e20; font-weight: bold; text-align: center;}
        
        /* Select Dropdowns */
        select.blank-select {
            padding: 5px; font-size: 1em; font-family: inherit; margin: 0 5px;
            border: 2px solid #ccc; border-radius: 5px; outline: none;
            transition: 0.3s background-color;
        }

        /* Order sentences */
        .order-pool { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; min-height: 40px; padding: 10px; background: #fafafa; border-radius: 5px;}
        .order-answer { display: flex; gap: 10px; flex-wrap: wrap; min-height: 50px; padding: 10px; background: #e8eaf6; border: 2px dashed #9fa8da; border-radius: 5px; margin-bottom: 10px;}
        .order-word { background: #fff; border: 1px solid #ccc; padding: 8px 15px; border-radius: 5px; cursor: pointer; user-select: none; font-weight: bold;}
        .order-word:hover { background: #f0f0f0; }

        /* General UI Elements */
        .btn-main {
            display: block; width: 100%; max-width: 300px; margin: 20px auto;
            background-color: var(--primary); color: white; border: none;
            padding: 15px 20px; font-size: 1.2em; border-radius: 30px;
            cursor: pointer; transition: 0.3s; text-align: center; font-weight: bold;
        }
        .btn-main:hover { background-color: var(--primary-hover); }
        
        .ru-sub { display: block; font-size: 0.7em; color: #e8f5e9; margin-top: 5px; font-weight: normal;}
        
        textarea.composition {
            width: 100%; height: 80px; padding: 10px; box-sizing: border-box;
            border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 1.1em;
            resize: vertical;
        }
        
        #result-screen { text-align: center; }
        .score-display { font-size: 3em; color: #2e7d32; font-weight: bold; margin: 20px 0; }

    </style>
</head>

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function createMCQ(container, questionsArray, sectionId) {
        questionsArray.forEach((qArr, idx) => {
            // FIX (Array Destructuring): Ensure complete separation of variables
            const [qText, options, correctIndex] = qArr;

            let div = document.createElement('div');
            div.className = 'question-card';
            // Print strictly ONLY the qText string
            div.innerHTML = `<div class="question-text">${idx + 1}. ${qText}</div><div class="options-grid" id="${sectionId}_q${idx}"></div>`;
            container.appendChild(div);
            
            let optionsContainer = div.querySelector('.options-grid');
            options.forEach((optText, optIdx) => {
                let btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.textContent = optText;
                btn.onclick = function() {
                    let allBtns = optionsContainer.querySelectorAll('.btn-option');
                    allBtns.forEach(b => b.disabled = true);
                    if (optIdx === correctIndex) { 
                        btn.classList.add('correct');
                        globalScore++;
                    } else {
                        btn.classList.add('incorrect');
                        allBtns[correctIndex].classList.add('correct');
                    }
                };
                optionsContainer.appendChild(btn);
            });
        });
    }

    function createTF(container, questionsArray, sectionId) {
        questionsArray.forEach((qArr, idx) => {
            // FIX (Array Destructuring): Isolates the string text from the boolean value
            const [qText, correctBool] = qArr;

            let div = document.createElement('div');
            div.className = 'question-card';
            // Print strictly ONLY the qText string (Never the correctBool)
            div.innerHTML = `<div class="question-text">${idx + 1}. ${qText}</div><div class="options-grid" id="${sectionId}_q${idx}"></div>`;
            container.appendChild(div);
            
            let optionsContainer = div.querySelector('.options-grid');
            let ops = [{t: "صَحِيح (Верно)", v: true}, {t: "خَطَأ (Неверно)", v: false}];
            
            ops.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.textContent = opt.t;
                btn.onclick = function() {
                    let allBtns = optionsContainer.querySelectorAll('.btn-option');
                    allBtns.forEach(b => b.disabled = true);
                    if (opt.v === correctBool) { 
                        btn.classList.add('correct');
                        globalScore++;
                    } else {
                        btn.classList.add('incorrect');
                        let correctBtn = Array.from(allBtns).find(b => (b.textContent.includes('صَحِيح') && correctBool === true) || (b.textContent.includes('خَطَأ') && correctBool === false));
                        if(correctBtn) correctBtn.classList.add('correct');
                    }
                };
                optionsContainer.appendChild(btn);
            });
        });
    }

                        <div id="s7_box"></div>
                        <button class="btn-main" onclick="showResults()">إِنْهَاءُ الِاخْتِبَارِ <span class="ru-sub">Завершить тест</span></button>`;
        container.appendChild(s7);
        let s7_box = document.getElementById('s7_box');
        s7_comps.forEach((wordText, idx) => {
            let div = document.createElement('div');
            div.className = 'question-card';
            div.innerHTML = `<div class="question-text">${idx+1}. ضَعْ كَلِمَةَ <strong style="color:#d84315;">(${wordText})</strong> فِي جُمْلَةٍ مُفِيدَةٍ مِنْ إِنْشَائِكَ:</div>
                             <textarea class="composition" placeholder="اكْتُبْ جُمْلَتَكَ هُنَا... (Напишите ваше предложение здесь)"></textarea>`;
            s7_box.appendChild(div);
        });

        // Result Screen
        let res = document.createElement('div');
        res.className = 'section';
        res.id = 'sec_result';
        res.innerHTML = `<div id="result-screen">
                            <h2>نَتِيجَةُ الِاخْتِبَارِ <span class="ru-sub">(Результаты теста)</span></h2>
                            <div class="score-display"><span id="final-score">0</span> / ${TOTAL_AUTO_QUESTIONS}</div>
                            <button class="btn-main" onclick="location.reload()">إِعَادَةُ الِاخْتِبَارِ <span class="ru-sub">Повторить тест</span></button>
                         </div>`;
        container.appendChild(res);
    }

    function nextSection(currentIdx) {
        document.getElementById(`sec${currentIdx}`).classList.remove('active');
        document.getElementById(`sec${currentIdx + 1}`).classList.add('active');
        window.scrollTo(0, 0);
    }

    function showResults() {
        document.getElementById(`sec6`).classList.remove('active');
        document.getElementById('final-score').textContent = globalScore;
        document.getElementById(`sec_result`).classList.add('active');
        window.scrollTo(0, 0);
    }

    // Initialize Quiz on load
    window.onload = buildQuiz;

</script>
</body>
</html>
