<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --correct-color: #27ae60; /* اللون الأخضر للإجابة الصحيحة */
            --wrong-color: #f1c40f; /* اللون الأصفر للإجابة الخاطئة */
            --bg-color: #ecf0f1;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 800px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
        }

        .progress {
            font-size: 1.1em;
            font-weight: 500;
            color: #7f8c8d;
        }

        .question-box {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.2em;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: right;
            color: var(--text-color);
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e2e6ea;
            border-color: #dae0e5;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-color) !important;
            color: #fff !important;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: var(--wrong-color) !important;
            color: #000 !important;
        }

        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #e8f8f5;
            border-right: 5px solid var(--correct-color);
            display: none;
            line-height: 1.6;
        }

        .feedback-box h3 {
            margin-top: 0;
            color: var(--correct-color);
        }

        .feedback-text {
            font-size: 1.1em;
        }

        .citation {
            margin-top: 10px;
            font-weight: bold;
            color: #7f8c8d;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .nav-btn {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 1.1em;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: var(--secondary-color);
        }

        .nav-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
    </style>
</head>

            options: ["صَوَابٌ", "خَطَأٌ"],
            correctIndex: 0,
            explanation: "صَوَابٌ: فَالظَّاهِرُ الْمُتَبَادَرُ لِلذِّهْنِ هُوَ الْحَيَوَانُ الْمُفْتَرِسُ، وَلَكِنَّ قَرِينَةَ (صَافَحْتُهُ) جَعَلَتْهُ لَفْظاً «مُؤَوَّلاً» فَيُحْمَلُ عَلَى الرَّجُلِ الشُّجَاعِ الْمَرْجُوحِ أَصْلاً.",
            citation: "الفقرة رقم 46 و 48"
        },
        {
            question: "«النَّصُّ الصَّرِيحُ» هُوَ اللَّفْظُ الَّذِي لَا يَحْتَمِلُ سِوَى مَعْنًى وَاحِدٍ فَقَطْ بِلَا أَيِّ شَكٍّ أَوْ مُعَارِضٍ.",
            options: ["صَوَابٌ", "خَطَأٌ"],
            correctIndex: 0,
            explanation: "صَوَابٌ: هَذَا مَا نَصَّ عَلَيْهِ الشَّارِحُ فِي خِتَامِ التَّفْرِيقِ بَيْنَ الظَّاهِرِ، وَالْمُؤَوَّلِ، وَالْمُجْمَلِ، وَالنَّصِّ الصَّرِيحِ.",
            citation: "الفقرة رقم 48"
        }
    ];

    let currentQuestionIndex = 0;
    let selectedAnswer = false;

    const questionTextElement = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackBox = document.getElementById('feedback-box');
    const feedbackText = document.getElementById('feedback-text');
    const citationText = document.getElementById('citation-text');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressText = document.getElementById('progress-text');

    function loadQuestion(index) {
        selectedAnswer = false;
        feedbackBox.style.display = 'none';
        
        const currentQ = questions[index];
        questionTextElement.innerText = currentQ.question;
        progressText.innerText = `السُّؤَالُ ${index + 1} مِنْ ${questions.length}`;

        optionsContainer.innerHTML = '';

        currentQ.options.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.onclick = () => checkAnswer(i, btn, currentQ);
            optionsContainer.appendChild(btn);
        });

        // إدارة حالة الأزرار
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === questions.length - 1;
    }

    function checkAnswer(selectedIndex, btnElement, currentQ) {
        if (selectedAnswer) return; // منع النقر المتعدد
        selectedAnswer = true;

        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQ.correctIndex) {
            btnElement.classList.add('correct');
        } else {
            btnElement.classList.add('wrong');
            // تظليل الإجابة الصحيحة بالأخضر
            allButtons[currentQ.correctIndex].classList.add('correct');
        }

        // عرض التعليل
        feedbackText.innerText = currentQ.explanation;
        citationText.innerText = `[الْمَصْدَرُ مِنَ النَّصِّ الْمُدْرَجِ: ${currentQ.citation}]`;
        feedbackBox.style.display = 'block';
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    // تهيئة اللعبة
    loadQuestion(currentQuestionIndex);
</script>

</body>
</html>
