<script>
const data = [
// الاختيار من متعدد (41 سؤال)
{q:"مَا هُوَ التَّعْرِيفُ الصَّحِيحُ لِلْمُفْتِي اصْطِلَاحاً؟",o:["مُجَرَّدُ نَاقِلٍ لِلْحُكْمِ","الْمُخْبِرُ عَنْ حُكْمٍ شَرْعِيٍّ لِكَوْنِهِ مُجْتَهِداً","كُلُّ مَنْ قَرَأَ كِتَاباً","الْقَاضِي الْمُلْزِمُ"],c:1,e:"الْمُفْتِي هُوَ الْعَالِمُ الْمُجْتَهِدُ الَّذِي يَفْقَهُ مَآخِذَ الْأَحْكَامِ، وَلَيْسَ مُجَرَّدَ نَاقِلٍ. [1]"},
{q:"كَمْ كَانَ عَدَدُ (الْمُكْثِرِينَ) مِنَ الصَّحَابَةِ فِي الْفُتْيَا رَغْمَ كَثْرَتِهِمْ؟",o:["جَمِيعُهُمْ","ثَلَاثُونَ","سَبْعَةٌ فَقَطْ","مِائَةٌ"],c:2,e:"كَانَ الْمُكْثِرُونَ 7 فَقَطْ، وَالْمُتَوَسِّطُونَ بِضْعَةً وَعِشْرِينَ، مِمَّا يَدُلُّ عَلَى تَوَرُّعِهِمْ. [2]"},
{q:"مِنْ شُرُوطِ جَوَازِ الْفَتْوَى أَنْ يَكُونَ الْمُفْتِي عَارِفاً بِالْحُكْمِ يَقِيناً أَو بِـ...",o:["الشَّكِّ","الظَّنِّ الرَّاجِحِ","الْوَهْمِ","التَّخْمِينِ"],c:1,e:"يُشْتَرَطُ أَنْ يَعْرِفَ الْحُكْمَ يَقِيناً أَوْ ظَنّاً رَاجِحاً، وَإِلَّا وَجَبَ التَّوَقُّفُ. [3]"},
{q:"مَاذَا يَجِبُ عَلَى الْمُفْتِي إِذَا سُئِلَ وَهُوَ غَضْبَانٌ أَوْ مَهْمُومٌ؟",o:["يُفْتِي فَوْراً","يَتَوَقَّفُ وَيَمْتَنِعُ","يُحِيلُ لِلْقَاضِي","يُفْتِي بِالْأَسْهَلِ"],c:1,e:"مِنْ شُرُوطِهِ أَنْ يَكُونَ هَادِئَ الْبَالِ لِيَتَمَكَّنَ مِنْ تَطْبِيقِ الْأَدِلَّةِ. [4]"},
{q:"هَلْ يَجِبُ عَلَى الْمُفْتِي إِجَابَةُ سُؤَالٍ (افْتِرَاضِيٍّ) لَمْ يَقَعْ؟",o:["نَعَمْ دَائِماً","لَا، إِلَّا بِقَصْدِ التَّعَلُّمِ","يَحْرُمُ مُطْلَقاً","نَعَمْ إِذَا سَأَلَهُ حَاكِمٌ"],c:1,e:"لَا يَجِبُ لِعَدَمِ وُقُوعِ الْحَادِثَةِ، إِلَّا لِتَدْرِيبِ الطُّلَّابِ. [5]"},
{q:"الْبَحْثُ عَنْ (أَسْهَلِ فَتْوَى) لِتَبْرِيرِ عَمَلٍ مُحَرَّمٍ يُسَمَّى:",o:["الِاجْتِهَادَ","تَتَبُّعَ الرُّخَصِ وَالتَّعَنُّتَ","التَّوْفِيقَ","الِاتِّبَاعَ"],c:1,e:"هَذَا تَتَبُّعٌ لِلرُّخَصِ، وَإِذَا عَلِمَ الْمُفْتِي ذَلِكَ لَمْ تَجِبْ عَلَيْهِ الْإِجَابَةُ. [6]"},
{q:"إِذَا نَتَجَ عَنِ الْفَتْوَى (مَفْسَدَةٌ أَكْبَرُ) كَقَطِيعَةِ رَحِمٍ، مَاذَا يَفْعَلُ الْمُفْتِي؟",o:["يُفْتِي","يُمْسِكُ عَنِ الْجَوَابِ","يَكْذِبُ","يَغْضَبُ"],c:1,e:"يَجِبُ الْإِمْسَاكُ لِدَفْعِ أَشَدِّ الْمَفْسَدَتَيْنِ بِأَخَفِّهِمَا. [7]"},
{q:"هَلْ (يَجِبُ) عَلَى الْعَامِّيِّ سُؤَالُ (الْأَعْلَمِ وَالْأَوْرَعِ) دَائِماً؟",o:["يَجِبُ يَقِيناً","يُسْتَحَبُّ وَيُفَضَّلُ","يُكْرَهُ","يَحْرُمُ"],c:1,e:"هُوَ مُسْتَحَبٌّ وَأَفْضَلُ، لِأَنَّ الصَّحَابَةَ سَأَلُوا الْمَفْضُولَ مَعَ وُجُودِ الْأَفْضَلِ بِلَا نَكِيرٍ. [8]"},
{q:"(بَذْلُ الْجُهْدِ لِإِدْرَاكِ حُكْمٍ شَرْعِيٍّ) هُوَ تَعْرِيفُ:",o:["التَّقْلِيدِ","الِاجْتِهَادِ","الْقِيَاسِ","الْإِجْمَاعِ"],c:1,e:"الِاجْتِهَادُ شَرْعاً هُوَ بَذْلُ الْجُهْدِ (وَالْمَشَقَّةِ) لِإِدْرَاكِ حُكْمٍ شَرْعِيٍّ. [9]"},
{q:"هَلْ يُشْتَرَطُ لِلْمُجْتَهِدِ أَنْ يَحْفَظَ (كُلَّ) آيَاتِ الْقَصَصِ وَالْفَضَائِلِ؟",o:["نَعَمْ","لَا، بَلْ آيَاتِ وَأَحَادِيثَ الْأَحْكَامِ فَقَطْ","يُشْتَرَطُ حِفْظُ التَّوْرَاةِ","يُشْتَرَطُ حِفْظُ الشِّعْرِ"],c:1,e:"يُشْتَرَطُ عِلْمُهُ بِمَا يَحْتَاجُهُ فِي اسْتِنْبَاطِ (الْأَحْكَامِ) كَآيَاتِ الْأَحْكَامِ. [10]"},
{q:"لِمَاذَا يَجِبُ أَنْ يَعْرِفَ الْمُجْتَهِدُ (النَّاسِخَ وَالْمَنْسُوخَ)؟",o:["لِيَتَفَاخَرَ بِهِ","لِئَلَّا يُفْتِيَ بِحُكْمٍ مُلْغًى وَبَاطِلٍ","لِكِتَابَةِ التَّارِيخِ","لِلِاسْتِعْرَاضِ"],c:1,e:"حَتَّى لَا يَحْكُمَ بِمَنْسُوخٍ، فَيَأْمُرَ بِمَا أَبْطَلَهُ الشَّرْعُ. [11]"},
{q:"الِاشْتِرَاطُ اللُّغَوِيُّ لِلْمُجْتَهِدِ يَعْنِي فَهْمَ النَّصِّ بِـ...",o:["تَعْقِيدٍ فَلْسَفِيٍّ","لُغَةِ السَّلِيقَةِ الْعَرَبِيَّةِ","لُغَةِ الْعَجَمِ","الرِّيَاضِيَّاتِ"],c:1,e:"يَجِبُ فَهْمُ النَّصِّ الشَّرْعِيِّ كَمَا يَفْهَمُهُ الْعَرَبِيُّ بِالسَّلِيقَةِ الَّتِي نَزَلَ بِهَا. [12]"},
{q:"مَا حُكْمُ (تَجَزُّؤِ الِاجْتِهَادِ)؛ كَأَنْ يَكُونَ مُجْتَهِداً بِالْمَوَارِيثِ وَمُقَلِّداً بِالْبُيُوعِ؟",o:["بَاطِلٌ","مُمْكِنٌ وَوَاقِعٌ وَجَائِزٌ","مُحَرَّمٌ","مَكْرُوهٌ"],c:1,e:"تَجَزُّؤُ الِاجْتِهَادِ مُمْكِنٌ وَجَائِزٌ عِنْدَ الْمُحَقِّقِينَ لِتَفَاوُتِ قُدُرَاتِ الْبَشَرِ. [13]"},
{q:"مَا هُوَ أَجْرُ الْمُجْتَهِدِ إِذَا (أَخْطَأَ) بَعْدَ بَذْلِ وُسْعِهِ؟",o:["لَا شَيْءَ لَهُ","يَأْثَمُ","لَهُ أَجْرٌ وَاحِدٌ وَالْخَطَأُ مَغْفُورٌ","يُعَاقَبُ"],c:2,e:"لَهُ أَجْرٌ وَاحِدٌ عَلَى اجْتِهَادِهِ الْمَشَقِّيِّ، وَخَطَؤُهُ مَغْفُورٌ لِحَدِيثِ (إِذَا حَكَمَ الْحَاكِمُ...). [14]"},
{q:"إِذَا (أَصَابَ) الْمُجْتَهِدُ الْحَقَّ فَلَهُ:",o:["أَجْرٌ","أَجْرَانِ","ثَلَاثَةٌ","أَرْبَعَةٌ"],c:1,e:"لَهُ أَجْرَانِ: أَجْرُ الِاجْتِهَادِ، وَأَجْرُ إِصَابَةِ الْحَقِّ وَإِظْهَارِهِ. [15]"},
{q:"(اتِّبَاعُ مَنْ لَيْسَ قَوْلُهُ حُجَّةً) هُوَ تَعْرِيفُ:",o:["الِاجْتِهَادِ","التَّقْلِيدِ","الْإِجْمَاعِ","الْقِيَاسِ"],c:1,e:"التَّقْلِيدُ اصْطِلَاحاً: اتِّبَاعُ مَنْ لَيْسَ قَوْلُهُ حُجَّةً. وَهَذَا يُخْرِجُ اتِّبَاعَ النَّبِيِّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ. [16]"},
{q:"(الْمُتَّبِعُ) الَّذِي يَسْأَلُ عَنِ الدَّلِيلِ وَلَا يَسْتَطِيعُ التَّرْجِيحَ هُوَ فِي حَقِيقَتِهِ:",o:["مُجْتَهِدٌ","مُقَلِّدٌ","نَبِيٌّ","مَعْصُومٌ"],c:1,e:"الْعَامِّيُّ الَّذِي يَعْجَزُ عَنِ الْمُوَازَنَةِ بَيْنَ الْأَدِلَّةِ يَبْقَى مُقَلِّداً لِلْعَالِمِ الَّذِي رَجَّحَ الدَّلِيلَ. [17]"},
{q:"هَلْ يَجُوزُ التَّقْلِيدُ لِلْعَامِّيِّ فِي (الْعَقَائِدِ) عِنْدَ الْمُحَقِّقِينَ؟",o:["لَا مُطْلَقاً","نَعَمْ يَجُوزُ لِعُمُومِ آيَةِ (فَاسْأَلُوا أَهْلَ الذِّكْرِ)","يَجُوزُ فِي الْفِقْهِ فَقَطْ","يَحْرُمُ"],c:1,e:"الرَّاجِحُ جَوَازُهُ لِلْعَامِّيِّ لِعُمُومِ الْآيَةِ الَّتِي نَزَلَتْ أَصْلًا فِي إِثْبَاتِ الرِّسَالَةِ (عَقِيدَة). [18]"},
{q:"مَا هُوَ (التَّقْلِيدُ الْعَامُّ)؟",o:["تَقْلِيدُ الْجُهَّالِ","الْتِزَامُ مَذْهَبٍ مُعَيَّنٍ فِي جَمِيعِ الْأُمُورِ","تَقْلِيدُ الصَّحَابَةِ كُلِّهِمْ","تَقْلِيدُ النَّبِيِّ"],c:1,e:"هُوَ أَنْ يَلْتَزِمَ الْمَرْءُ مَذْهَباً مُعَيَّناً يَأْخُذُ بِرُخَصِهِ وَعَزَائِمِهِ، وَهُوَ جَائِزٌ. [19]"},
{q:"مَا حُكْمُ مَنْ خَالَفَ مَذْهَبَهُ (بِمُجَرَّدِ اتِّبَاعِ الْهَوَى) لِيَأْخُذَ بِرُخْصَةٍ بِلَا دَلِيلٍ؟",o:["جَائِزٌ","مُنْكَرٌ شَرْعِيٌّ (مُتَّبِعٌ لِهَوَاهُ)","مُسْتَحَبٌّ","وَاجِبٌ"],c:1,e:"هَذَا مُتَّبِعٌ لِهَوَاهُ فَاعِلٌ لِمُحَرَّمٍ بِلَا عُذْرٍ كَمَا نَصَّ شَيْخُ الْإِسْلَامِ ابْنُ تَيْمِيَّةَ. [20]"},
{q:"إِذَا (بَانَ الدَّلِيلُ) لِلْمُقَلِّدِ فَخَالَفَ إِمَامَهُ لِقُوَّةِ الْحَدِيثِ، مَا حُكْمُهُ؟",o:["مَذْمُومٌ","حَسَنٌ بَلْ يَجِبُ عَلَيْهِ ذَلِكَ","يَأْثَمُ","بَاطِلٌ"],c:1,e:"إِذَا خَالَفَهُ لِدَلِيلٍ أَرْجَحَ أَوْ تَقْلِيداً لِأَعْلَمَ فَقَدْ أَحْسَنَ لِقَوْلِهِمْ: (إِذَا صَحَّ الْحَدِيثُ فَهُوَ مَذْهَبِي). [21]"},
{q:"إِلْزَامُ جَمِيعِ النَّاسِ بِتَقْلِيدِ (إِمَامٍ مُعَيَّنٍ) فِي كُلِّ شَيْءٍ دُونَ مَنْ سِوَاهُ يُعَدُّ:",o:["تَوْحِيداً لِلْأُمَّةِ","خِلَافاً لِلْإِجْمَاعِ وَصَاحِبُهُ يُسْتَتَابُ","إِجْمَاعاً قَطْعِيّاً","سُنَّةً حَسَنَةً"],c:1,e:"نَصَّ ابْنُ تَيْمِيَّةَ أَنَّ ذَلِكَ خِلَافُ الْإِجْمَاعِ، لِأَنَّ الطَّاعَةَ الْمُطْلَقَةَ لَيْسَتْ إِلَّا لِلَّهِ وَرَسُولِهِ. [22]"},
{q:"هَلْ يَجُوزُ لِلْمُجْتَهِدِ أَنْ (يُقَلِّدَ) مُجْتَهِداً آخَرَ؟",o:["لَا يَجُوزُ أَبَداً","نَعَمْ، عِنْدَ ضِيقِ الْوَقْتِ فِي حَادِثَةٍ فَوْرِيَّةٍ","نَعَمْ دَائِماً","يَكْفُرُ إِنْ فَعَلَ"],c:1,e:"التَّقْلِيدُ يَجُوزُ لِلْمُجْتَهِدِ لِلضَّرُورَةِ إِذَا طَرَأَتْ حَادِثَةٌ فَوْرِيَّةٌ وَلَمْ يَتَمَكَّنْ مِنَ الْبَحْثِ. [23]"},
{q:"مَعْنَى اخْتِلَافُ الْعُلَمَاءِ (رَحْمَةٌ) فِي الْفُرُوعِ يَعْنِي:",o:["أَنَّ الدِّينَ نَاقِصٌ","أَنَّ السَّائِلَ مَعْذُورٌ وَالْمُجْتَهِدَ مَأْجُورٌ","التَّعَصُّبَ وَالتَّفَرُّقَ","الضَّيَاعَ"],c:1,e:"الْمُجْتَهِدُ مَأْجُورٌ وَالسَّائِلُ مَعْذُورٌ، فَهِيَ سَعَةٌ رَحِمَ اللَّهُ بِهَا الْأُمَّةَ. [24]"},
{q:"لِمَاذَا لَمْ يَأْمُرِ النَّبِيُّ مُعَاذاً بِشَرْحِ (مَآخِذِ الْأَدِلَّةِ) لِأَهْلِ الْيَمَنِ؟",o:["لِأَنَّهُمْ عُلَمَاءُ","لِأَنَّ الْعَامِّيَّ لَا يَفْهَمُ الدَّلِيلَ، فَيَكْفِيهِ التَّقْلِيدُ وَالِاتِّبَاعُ","لِأَنَّ الدِّينَ سِرٌّ","لِأَنَّ مُعَاذاً لَيْسَ عَالِماً"],c:1,e:"أَمَرَهُ بِتَبْلِيغِ الْأَحْكَامِ مُبَاشَرَةً (الصَّلَاةِ وَالزَّكَاةِ) لِأَنَّ الْعَوَامَّ لَا يُطَالَبُونَ بِالتَّفَاصِيلِ. [25]"},
{q:"(دَلِيلُ الْإِشَارَةِ) فِي مَنْعِ الْمُحْدِثِ مِنْ مَسِّ الْمُصْحَفِ مُسْتَنْبَطٌ مِنْ آيَةٍ تَتَحَدَّثُ أَصْلًا عَنْ:",o:["الْبَشَرِ","الْمَلَائِكَةِ الْمُطَهَّرِينَ","الْجِنِّ","الْأَنْبِيَاءِ"],c:1,e:"الْآيَةُ (لَا يَمَسُّهُ إِلَّا الْمُطَهَّرُونَ) تَتَحَدَّثُ عَنِ الْمَلَائِكَةِ، لَكِنَّ فِيهَا إِشَارَةً لِتَعْظِيمِ الْقُرْآنِ عَنِ الْمُحْدِثِينَ. [26]"},
{q:"اللَّفْظُ الَّذِي يَسْتَخْدِمُهُ الشَّارِعُ بِمَعْنَى (الْيَقِينِ) تَارَةً، وَبِمَعْنَى (الْوَهْمِ) تَارَةً، هُوَ لَفْظُ:",o:["الْقِيَاسِ","الظَّنِّ","الْإِجْمَاعِ","التَّقْلِيدِ"],c:1,e:"لَفْظُ (الظَّنِّ) فِي الْقُرْآنِ يَأْتِي لِلْيَقِينِ كَقَوْلِهِ (الَّذِينَ يَظُنُّونَ أَنَّهُمْ مُلَاقُو رَبِّهِمْ)، وَلِلْوَهْمِ كَقَوْلِهِ (إِنْ يَتَّبِعُونَ إِلَّا الظَّنَّ). [27]"},
{q:"لَوْ قَالَ الرَّجُلُ لِزَوْجَتِهِ (أَنْتِ عَلَيَّ حَرَامٌ)، فَمَاذَا يَجِبُ عَلَى الْمُفْتِي؟",o:["يُوقِعُ الطَّلَاقَ فَوْراً","يُوقِعُ الظِّهَارَ فَوْراً","يَسْتَفْصِلُ عَنْ نِيَّتِهِ (تَصَوُّرٌ تَامٌّ)","يَطْرُدُهُ"],c:2,e:"يَجِبُ أَنْ يَسْتَفْصِلَ (هَلْ قَصَدَ طَلَاقاً أَمْ ظِهَاراً أَمْ يَمِيناً؟) لِأَنَّ الْحُكْمَ فَرْعٌ عَنِ التَّصَوُّرِ. [28]"},
{q:"إِذَا سُئِلَ الْمُفْتِي عَنْ (مَرِيضٍ نَفْسِيٍّ)، مَا هِيَ الْخُطْوَةُ الصَّحِيحَةُ؟",o:["يُفْتِي مِنَ الْخَيَالِ","يَرْجِعُ لِلْأَطِبَّاءِ لِفَهْمِ مَعْنَى الْمَرَضِ الْمَقْصُودِ دِقَّةً","يُكَفِّرُهُ","يَتَجَاهَلُهُ"],c:1,e:"يَجِبُ التَّصَوُّرُ التَّامُّ بِالرُّجُوعِ لِلْمُتَخَصِّصِينَ لِيَعْرِفَ هَلْ يَفْقِدُ الْإِرَادَةَ أَمْ لَا، قَبْلَ إِصْدَارِ الْحُكْمِ. [29]"},
{q:"أَوَّلُ مَنْ جَمَعَ آيَاتِ الْأَحْكَامِ (500 آيَةٍ) هُوَ:",o:["مُقَاتِلٌ بْنُ سُلَيْمَانَ","اِبْنُ تَيْمِيَّةَ","الشَّافِعِيُّ","أَحْمَدُ"],c:0,e:"مُقَاتِلٌ هُوَ أَوَّلُ مَنْ جَمَعَ آيَاتِ الْأَحْكَامِ فِي كِتَابٍ. [30]"},
{q:"كِتَابُ (تَفْسِيرُ آيَاتٍ أَشْكَلَتْ عَلَى كَثِيرٍ مِنَ الْعُلَمَاءِ) لِمَنْ؟",o:["الشَّوْكَانِيِّ","اِبْنِ تَيْمِيَّةَ","مُقَاتِلٍ","السُّيُوطِيِّ"],c:1,e:"هُوَ لِشَيْخِ الْإِسْلَامِ ابْنِ تَيْمِيَّةَ يَشْرَحُ فِيهِ آيَاتٍ صَعُبَ فَهْمُهَا عَلَى الْمُفَسِّرِينَ. [31]"},
{q:"كِتَابُ (مُنْتَقَى الْأَخْبَارِ) مِنْ أَشْهَرِ كُتُبِ أَحَادِيثِ الْأَحْكَامِ، لِمَنْ؟",o:["اِبْنِ تَيْمِيَّةَ الْجَدِّ (أَبُو الْبَرَكَاتِ)","الشَّوْكَانِيِّ","الشَّافِعِيِّ","الطَّرِيفِيِّ"],c:0,e:"هُوَ لِمَجْدِ الدِّينِ أَبِي الْبَرَكَاتِ ابْنِ تَيْمِيَّةَ الْجَدِّ. [32]"},
{q:"هَلْ الِاجْتِهَادُ خَاصٌّ بِزَمَنِ الصَّحَابَةِ وَالتَّابِعِينَ فَقَطْ؟",o:["نَعَمْ","لَا، بَلْ بَابُهُ مَفْتُوحٌ فِي كُلِّ زَمَانٍ لِمَنْ تَأَهَّلَ لَهُ","نَعَمْ فِي الْفِقْهِ فَقَطْ","نَعَمْ بِالْإِجْمَاعِ"],c:1,e:"اللَّهُ لَمْ يُقَيِّدِ الِاجْتِهَادَ وَالْفُتْيَا بِزَمَنٍ، بَلْ هُوَ لِمَنْ تَأَهَّلَ بِشُرُوطِهِ فِي كُلِّ زَمَانٍ. [33]"},
{q:"لِمَاذَا حَرَّمَ بَعْضُ الْعُلَمَاءِ تَقْلِيدَ مَذْهَبٍ مُعَيَّنٍ (كَالشَّافِعِيِّ)؟",o:["لِأَنَّهُمْ أَعْدَاءٌ لِلْمَذَاهِبِ","لِأَنَّ فِيهِ الْتِزَاماً مُطْلَقاً لِغَيْرِ النَّبِيِّ وَهُوَ مَا لَمْ يَأْمُرْ بِهِ النَّبِيُّ","لِأَنَّ الْمَذَاهِبَ بَاطِلَةٌ","لِأَنَّهَا جَدِيدَةٌ"],c:1,e:"حَرَّمُوهُ لِأَنَّ فِيهِ طَاعَةً مُطْلَقَةً لِغَيْرِ الْمَعْصُومِ، وَلَكِنَّ الرَّاجِحَ جَوَازُ الِالْتِزَامِ الْعَامِّ لِمَنْعِ تَتَبُّعِ الرُّخَصِ. [34]"},
{q:"(الْأَحْكَامُ تَلِيقُ عَلَى أَعْيَانِ الْمُكَلَّفِينَ) هَذَا يَعْنِي أَنَّ:",o:["الْأَحْكَامَ ثَابِتَةٌ لَا تَتَغَيَّرُ","الْفَتْوَى تَتَغَيَّرُ بِتَغَيُّرِ الزَّمَانِ وَالْمَكَانِ وَالْأَشْخَاصِ","الدِّينَ لُعْبَةٌ","كُلَّ النَّاسِ حُكْمُهُمْ وَاحِدٌ"],c:1,e:"الْفَتْوَى هِيَ الَّتِي تَتَغَيَّرُ بِحَسَبِ (عِلَّةِ) الزَّمَانِ وَالْمَكَانِ، فَلِبَاسُ الشُّهْرَةِ فِي بَلَدٍ قَدْ يَكُونُ مُبَاحاً فِي آخَرَ. [35]"},
{q:"إِذَا لَمْ يَتَيَقَّنِ الْمُفْتِي مِنَ الْحُكْمِ وَلَا غَلَبَ عَلَى ظَنِّهِ، مَاذَا يَفْعَلُ؟",o:["يَسْتَخِيرُ","يَتَوَقَّفُ وَلَا يُفْتِي","يُفْتِي بِالشَّكِّ","يَرْمِي عُمْلَةً"],c:1,e:"إِذَا تَسَاوَى الِاحْتِمَالَانِ عِنْدَهُ وَجَبَ عَلَيْهِ التَّوَقُّفُ كَمَا نَصَّ الْمُصَنِّفُ. [36]"},
{q:"كَيْفَ يَكُونُ الِاجْتِهَادُ شَاقّاً (كَمَا فِي تَعْرِيفِهِ اللُّغَوِيِّ)؟",o:["بِحَمْلِ حَجَرٍ ثَقِيلٍ","بِاسْتِفْرَاغِ الْوُسْعِ فِي الْبَحْثِ بَيْنَ الْأَدِلَّةِ وَالْعِلَلِ","بِالرَّكْضِ طَوِيلًا","بِتَقْلِيدِ الْآخَرِينَ"],c:1,e:"الِاجْتِهَادُ الشَّرْعِيُّ هُوَ بَذْلُ الْجُهْدِ فِي تَتَبُّعِ الْأَسَانِيدِ وَالْعِلَلِ وَأَقْوَالِ الْعُلَمَاءِ لِإِدْرَاكِ الْحُكْمِ. [9]"},
{q:"إِذَا وُجِدَ عَامِّيٌّ لَا يَعْرِفُ مَآخِذَ الْأَدِلَّةِ، فَمَاذَا يَلْزَمُهُ؟",o:["تَأْلِيفُ الْكُتُبِ","الِاجْتِهَادُ","التَّقْلِيدُ لِعُلَمَاءِ زَمَانِهِ","تَرْكُ الدِّينِ"],c:2,e:"إِذَا تَعَذَّرَ عَلَيْهِ مَعْرِفَةُ الْحَقِّ بِنَفْسِهِ، لَمْ يَبْقَ لَهُ إِلَّا التَّقْلِيدُ (فَاسْأَلُوا أَهْلَ الذِّكْرِ). [37]"},
{q:"شَرْحُ أَحَادِيثِ (مُنْتَقَى الْأَخْبَارِ) فِي كِتَابِ (نَيْلِ الْأَوْطَارِ) هُوَ لِلْإِمَامِ:",o:["الشَّوْكَانِيِّ","الشَّافِعِيِّ","الْغَزَالِيِّ","الرَّازِيِّ"],c:0,e:"نَيْلُ الْأَوْطَارِ هُوَ شَرْحٌ بَدِيعٌ لِلشَّوْكَانِيِّ. [32]"},
{q:"لِمَاذَا (الظَّنُّ) الْمَنْطِقِيُّ عِنْدَ الْأُصُولِيِّينَ لَا يُسَاوِي الْيَقِينَ؟",o:["لِأَنَّهُ لُغَةُ الْعَرَبِ","لِأَنَّهُ بِمَعْنَى (غَلَبَةِ الظَّنِّ) فِي مَسْأَلَةٍ خِلَافِيَّةٍ تَحْتَمِلُ وَجْهَيْنِ","لِأَنَّهُ مَذْمُومٌ","لِأَنَّهُ حَرَامٌ"],c:1,e:"عِنْدَ الْأُصُولِيِّينَ، إِذَا كَانَتِ الْمَسْأَلَةُ تَحْتَمِلُ وَجْهَيْنِ فَيَغْلِبُ عَلَى ظَنِّهِ أَحَدُهُمَا يُسَمَّى ظَنّاً رَاجِحاً لَا يَقِيناً. [36]"},
{q:"(وَإِنَّمَا التَّفَاتُهُ إِلَى الْحُجَّةِ)؛ كَلِمَةُ الشَّافِعِيِّ هَذِهِ تَحُثُّ عَلَى:",o:["التَّقْلِيدِ الْأَعْمَى","تَرْكِ مَذْهَبِهِ إِذَا صَحَّ الْحَدِيثُ بِخِلَافِهِ","الْتِزَامِ مَذْهَبِهِ فَقَطْ","التَّكَبُّرِ"],c:1,e:"قَالَ الشَّافِعِيُّ (إِذَا صَحَّ الْحَدِيثُ فَهُوَ مَذْهَبِي)، مِمَّا يُوجِبُ تَرْكَ الْمَذْهَبِ لِأَجْلِ قُوَّةِ الدَّلِيلِ. [38]"},

// صح وخطأ (41 سؤال)
{q:"الْمُفْتِي هُوَ مُجَرَّدُ شَخْصٍ قَرَأَ كِتَاباً فِقْهِيّاً وَنَقَلَهُ لِلنَّاسِ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. هَذَا يُسَمَّى (مُخْبِراً)، أَمَّا الْمُفْتِي فَهُوَ الْعَالِمُ الْمُجْتَهِدُ الَّذِي يَفْقَهُ مَآخِذَ الْأَحْكَامِ. [39]"},
{q:"تَوَرَّعَ الصَّحَابَةُ عَنِ الْفَتْوَى، فَلَمْ يُكْثِرْ فِيهَا إِلَّا سَبْعَةٌ فَقَطْ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. رَغْمَ كَثْرَتِهِمْ تَصَدَّرَ 7 فَقَطْ وَتَوَسَّطَ عِشْرُونَ لِتَوَرُّعِهِمْ الْعَظِيمِ. [2]"},
{q:"الْأَحْكَامُ شَيْءٌ ثَابِتٌ، بَيْنَمَا الْفَتْوَى تَتَغَيَّرُ بِتَغَيُّرِ الزَّمَانِ وَالْمَكَانِ وَالْأَشْخَاصِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. الْحُكْمُ (كَالتَّحْرِيمِ) ثَابِتٌ، لَكِنَّ إِنْزَالَهُ عَلَى وَاقِعِ الْمُسْتَفْتِي (الْفَتْوَى) يَتَغَيَّرُ. [35]"},
{q:"لَا يُشْتَرَطُ (التَّصَوُّرُ التَّامُّ) لِلسُّؤَالِ مِنْ قِبَلِ الْمُفْتِي.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. الْحُكْمُ عَلَى الشَّيْءِ فَرْعٌ عَنْ تَصَوُّرِهِ، فَإِذَا لَمْ يَتَصَوَّرْهُ بِدِقَّةٍ سَيُخْطِئُ. [40]"},
{q:"يَجُوزُ لِلْمُفْتِي إِصْدَارُ الْفَتْوَى بِمُجَرَّدِ الشَّكِّ (50/50).",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. يَجِبُ أَنْ يَكُونَ لَدَيْهِ يَقِينٌ أَوْ (ظَنٌّ رَاجِحٌ)، وَإِلَّا وَجَبَ عَلَيْهِ التَّوَقُّفُ. [36]"},
{q:"كَلِمَةُ (الظَّنِّ) قَدْ تَعْنِي (الْيَقِينَ) فِي اللُّغَةِ الْعَرَبِيَّةِ كَمَا فِي الْقُرْآنِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. مِثْلَ قَوْلِهِ تَعَالَى (الَّذِينَ يَظُنُّونَ أَنَّهُمْ مُلَاقُو رَبِّهِمْ) أَيْ يُوقِنُونَ. [27]"},
{q:"يَجِبُ دَائِماً إِجَابَةُ السَّائِلِ حَتَّى عَنِ الْأَحْدَاثِ (الِافْتِرَاضِيَّةِ) الْخَيَالِيَّةِ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. مِنْ شُرُوطِ وُجُوبِ الْفَتْوَى (وُقُوعُ الْحَادِثَةِ) إِلَّا لِقَصْدِ تَدْرِيبِ الطُّلَّابِ. [5]"},
{q:"(تَتَبُّعُ الرُّخَصِ) لِلْبَحْثِ عَنْ فَتْوَى تُبِيحُ الْمُحَرَّمَاتِ أَمْرٌ مَذْمُومٌ شَرْعاً.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. إِذَا عَلِمَ الْمُفْتِي أَنَّ هَذَا هُوَ قَصْدُ السَّائِلِ (التَّعَنُّتُ) لَمْ يَجِبْ عَلَيْهِ الْإِفْتَاءُ. [6]"},
{q:"إِذَا عَلِمَ الْمُفْتِي أَنَّ فَتْوَاهُ سَتُسَبِّبُ (دِمَاءً أَوْ قَطِيعَةً)، يُمْسِكُ عَنِ الْجَوَابِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. دَفْعُ أَشَدِّ الْمَفْسَدَتَيْنِ وَاجِبٌ، فَيَتَوَقَّفُ إِنْ تَرَتَّبَ عَلَى الْفَتْوَى ضَرَرٌ أَكْبَرُ. [7]"},
{q:"السَّائِلُ مُطَالَبٌ بِالْبَحْثِ عَنِ (الْحَقِّ) لِيَعْمَلَ بِهِ، لَا لِيَخْتَبِرَ الْمُفْتِيَ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. مِنَ الْمَقَاصِدِ السَّيِّئَةِ إِفْحَامُ الْمُفْتِي أَوِ التَّعَنُّتُ بِسُؤَالِهِ. [41]"},
{q:"يَجِبُ وُجُوباً عَيْنِيّاً عَلَى الْعَامِّيِّ أَنْ يَبْحَثَ عَنْ (الْأَعْلَمِ وَالْأَوْرَعِ) دَائِماً.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. بَلْ هُوَ (مُسْتَحَبٌّ)، إِذْ كَانَ الصَّحَابَةُ يَسْتَفْتُونَ الْمَفْضُولَ مَعَ وُجُودِ الْفَاضِلِ بِلَا نَكِيرٍ. [8]"},
{q:"تَعْرِيفُ الِاجْتِهَادِ هُوَ: بَذْلُ الْجُهْدِ فِي أَمْرٍ (يَسِيرٍ) لَا مَشَقَّةَ فِيهِ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. لُغَةً وَشَرْعاً هُوَ بَذْلُ الْجُهْدِ لِإِدْرَاكِ (أَمْرٍ شَاقٍّ)، كَاسْتِنْبَاطِ الْأَحْكَامِ. [9]"},
{q:"الْمُجْتَهِدُ لَا يُشْتَرَطُ أَنْ يَحْفَظَ كُلَّ الْأَحَادِيثِ، بَلْ يَكْفِي مَا يَتَعَلَّقُ بِـ (الْأَحْكَامِ).",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. لَا يُشْتَرَطُ مَعْرِفَةُ كُلِّ أَحَادِيثِ الْقَصَصِ وَالْفَضَائِلِ لِيَصِحَّ اجْتِهَادُهُ فِي الْفِقْهِ. [10]"},
{q:"لَا يَلْزَمُ الْمُجْتَهِدَ أَنْ يَعْرِفَ دَرَجَةَ صِحَّةِ الْحَدِيثِ كَالْمُحَدِّثِينَ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. يَجِبُ أَنْ يَعْرِفَ مَا يَتَعَلَّقُ بِصِحَّةِ وَضَعْفِ الْحَدِيثِ وَالرِّجَالِ لِيَسْتَدِلَّ بِصَحِيحِهِ. [42]"},
{q:"مَعْرِفَةُ (النَّاسِخِ وَالْمَنْسُوخِ) ضَرُورِيَّةٌ لِلْمُجْتَهِدِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. حَتَّى لَا يُفْتِيَ بِحُكْمٍ أَلْغَاهُ اللَّهُ تَعَالَى وَصَارَ مَنْسُوخاً. [11]"},
{q:"شَرْطُ اللُّغَةِ لِلْمُجْتَهِدِ يَعْنِي أَنْ يَكُونَ عَالِماً بِكُلِّ أَشْعَارِ الْعَرَبِ وَنَوَادِرِهَا.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. يَكْفِيهِ مَعْرِفَةُ اللُّغَةِ بِطَرِيقَةٍ (سَلِيقِيَّةٍ) لِيَفْهَمَ النَّصَّ كَمَا يَفْهَمُهُ الْعَرَبِيُّ، دُونَ تَكَلُّفٍ صِنَاعِيٍّ. [43]"},
{q:"تَجَزُّؤُ الِاجْتِهَادِ يَعْنِي أَنْ يَكُونَ مُجْتَهِداً فِي (الْمَوَارِيثِ) وَمُقَلِّداً فِي غَيْرِهَا.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. وَهَذَا مُمْكِنٌ وَوَاقِعٌ عِنْدَ الْمُحَقِّقِينَ لِتَفَاوُتِ قُدُرَاتِ الْبَشَرِ فِي الِاسْتِيعَابِ. [44]"},
{q:"إِذَا اجْتَهَدَ الْحَاكِمُ وَ(أَخْطَأَ) فَإِنَّهُ يَأْثَمُ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. إِذَا بَذَلَ وُسْعَهُ وَأَخْطَأَ فَلَهُ أَجْرٌ وَاحِدٌ وَالْخَطَأُ مَغْفُورٌ. [14]"},
{q:"التَّقْلِيدُ هُوَ اتِّبَاعُ مَنْ (قَوْلُهُ حُجَّةٌ) كَالنَّبِيِّ مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. التَّقْلِيدُ هُوَ اتِّبَاعُ مَنْ (لَيْسَ قَوْلُهُ حُجَّةً). اتِّبَاعُ النَّبِيِّ يُسَمَّى اتِّبَاعاً لِلدَّلِيلِ لَا تَقْلِيداً إِلَّا مَجَازاً. [16]"},
{q:"الشَّخْصُ (الْمُتَّبِعُ) الَّذِي يَأْخُذُ بِتَرْجِيحِ عَالِمٍ دُونَ قُدْرَةٍ ذَاتِيَّةٍ هُوَ (مُقَلِّدٌ) فِي الْحَقِيقَةِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. الْعَامِّيُّ إِنْ سَمِعَ الدَّلِيلَ يَبْقَى عَاجِزاً عَنِ الْمُوَازَنَةِ، فَيَعُودُ لِتَقْلِيدِ الْعَالِمِ. [17]"},
{q:"يَجُوزُ لِلْعَامِّيِّ (التَّقْلِيدُ فِي أُصُولِ الدِّينِ وَالْعَقَائِدِ) لِعُمُومِ آيَةِ (فَاسْأَلُوا أَهْلَ الذِّكْرِ).",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. وَهَذَا هُوَ الرَّاجِحُ خِلَافاً لِمَنْ مَنَعَهُ مِنَ الْمُتَأَخِّرِينَ، لِأَنَّهُ لَا يَسْتَطِيعُ الْأَدِلَّةَ التَّفْصِيلِيَّةَ. [18]"},
{q:"(التَّقْلِيدُ الْعَامُّ) بِالْتِزَامِ مَذْهَبٍ فِقْهِيٍّ كَالْمَالِكِيِّ أَمْرٌ جَائِزٌ لِمَنْعِ تَتَبُّعِ الرُّخَصِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. وَهُوَ رَأْيُ السُّيُوطِيِّ وَغَيْرِهِ، حَتَّى يَنْضَبِطَ تَدَيُّنُ الْعَامِّيِّ. [19]"},
{q:"إِذَا خَالَفَ شَخْصٌ مَذْهَبَهُ لِمُجَرَّدِ (اتِّبَاعِ الْهَوَى) فَهُوَ مُنْكَرٌ شَرْعِيٌّ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. نَصَّ ابْنُ تَيْمِيَّةَ أَنَّ مَنْ فَعَلَ خِلَافَ مَذْهَبِهِ لِمُجَرَّدِ التَّشَهِّي فَهُوَ مُتَّبِعٌ لِهَوَاهُ عَاصٍ. [20]"},
{q:"تَرْكُ الْمَذْهَبِ لِأَجْلِ (قُوَّةِ الدَّلِيلِ الصَّحِيحِ) يُعْتَبَرُ خِيَانَةً يَأْثَمُ عَلَيْهَا الْمَرْءُ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. بَلْ قَدْ أَحْسَنَ لِأَنَّ الطَّاعَةَ لِلدَّلِيلِ، وَأَئِمَّةُ الْمَذَاهِبِ قَالُوا: إِذَا صَحَّ الْحَدِيثُ فَهُوَ مَذْهَبِي. [21]"},
{q:"إِلْزَامُ جَمِيعِ الْأُمَّةِ بِتَقْلِيدِ (إِمَامٍ مُعَيَّنٍ فِي كُلِّ شَيْءٍ) يُعَدُّ ضَلَالًا وَخِلَافاً لِلْإِجْمَاعِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. الطَّاعَةُ الْمُطْلَقَةُ لَيْسَتْ إِلَّا لِلَّهِ وَرَسُولِهِ، وَمَنْ أَوْجَبَ طَاعَةَ إِمَامٍ مُعَيَّنٍ فِي كُلِّ شَيْءٍ يُسْتَتَابُ. [22]"},
{q:"الْمُجْتَهِدُ لَا يَجُوزُ لَهُ أَنْ يُقَلِّدَ مُجْتَهِداً آخَرَ حَتَّى فِي حَالِ (ضِيقِ الْوَقْتِ لِلنَّازِلَةِ).",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. يَجُوزُ لِلْمُجْتَهِدِ التَّقْلِيدُ لِلضَّرُورَةِ فِي حَالِ الْفَوْرِيَّةِ إِنْ لَمْ يَتَمَكَّنْ مِنَ الْبَحْثِ. [23]"},
{q:"اخْتِلَافُ الْأُمَّةِ فِي الْفُرُوعِ الَّذِي يَنْتِجُ عَنْ اجْتِهَادٍ هُوَ رَحْمَةٌ وَسَعَةٌ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. السَّائِلُ مَعْذُورٌ وَالْمُجْتَهِدُ مَأْجُورٌ، فَالِاخْتِلَافُ الَّذِي خَلَا مِنَ التَّعَصُّبِ سَعَةٌ. [24]"},
{q:"الشَّرْعُ لَمْ يَحْسِمْ جَمِيعَ الْمَسَائِلِ بِأَدِلَّةٍ قَطْعِيَّةٍ لِيُعْطِيَ مَجَالاً لِلِاجْتِهَادِ وَالسَّعَةِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. كَانَ يُمْكِنُ لِلَّهِ أَنْ يَجْعَلَهَا مَحْسُومَةً، لَكِنْ لِيَتَعَبَّدُوا بِالِاجْتِهَادِ وَتَكُونَ رَحْمَةً لَهُمْ. [45]"},
{q:"(كِتَابُ السَّعَةِ) هُوَ الِاسْمُ الَّذِي اقْتَرَحَهُ الْإِمَامُ أَحْمَدُ لِكِتَابٍ يَتَنَاوَلُ خِلَافَ الْعُلَمَاءِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. لِأَنَّ الِاخْتِلَافَ فِي الْفُرُوعِ بِهِ سَعَةٌ لِلْأُمَّةِ. [46]"},
{q:"الِاتِّبَاعُ الْمُطْلَقُ (بِلَا نِقَاشٍ لِلْأَدِلَّةِ) مَشْرُوعٌ فَقَطْ لِلَّهِ وَلِرَسُولِهِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. أَيُّ عَالِمٍ آخَرَ كَلَامُهُ يُؤْخَذُ وَيُرَدُّ إِلَّا رَسُولَ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ. [47]"},
{q:"مُجَرَّدُ ظُهُورِ شَخْصٍ بِمَظْهَرِ الْمَشَايِخِ يَكْفِي لِلْعَامِّيِّ أَنْ يَعْتَبِرَهُ مُفْتِياً.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. يَجِبُ أَنْ يَتَثَبَّتَ مِنْ كَوْنِهِ (أَهْلًا لِلْفَتْوَى) بِالْعِلْمِ وَالْوَرَعِ، لَا بِمُجَرَّدِ الْمَظْهَرِ. [48]"},
{q:"وُجُوبُ طَاعَةِ الْمَذْهَبِ مُقَدَّمٌ عَلَى النَّصِّ الشَّرْعِيِّ إِذَا تَعَارَضَا.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. النَّصُّ مُقَدَّمٌ قَطْعاً كَمَا أَجْمَعُوا، وَالْأَئِمَّةُ صَرَّحُوا: إِذَا صَحَّ الْحَدِيثُ فَهُوَ مَذْهَبِي. [49]"},
{q:"عِنْدَ تَسَاوِي الْأَدِلَّةِ (50/50)، يُبَاحُ لِلْمُفْتِي اخْتِيَارُ الْأَيْسَرِ بِلَا مُرَجِّحٍ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. عِنْدَ التَّسَاوِي الشَّكِّيِّ، (يَجِبُ التَّوَقُّفُ) لِعَدَمِ حُصُولِ الْيَقِينِ أَوْ غَلَبَةِ الظَّنِّ. [36]"},
{q:"(وُقُوعُ الْحَادِثَةِ) هُوَ مِنْ شُرُوطِ (وُجُوبِ) إِصْدَارِ الْفَتْوَى.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. إِذَا لَمْ تَقَعِ النَّازِلَةُ (افْتِرَاضِيَّةٌ)، لَا يَجِبُ عَلَى الْمُفْتِي الْإِجَابَةُ إِلَّا لِلتَّعْلِيمِ. [50]"},
{q:"ضَرْبُ أَقْوَالِ الْعُلَمَاءِ بَعْضِهَا بِبَعْضٍ مِنْ أَفْعَالِ التَّعَنُّتِ السَّيِّئَةِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. الْمُسْتَفْتِي يَجِبُ أَنْ يَقْصِدَ بِسُؤَالِهِ مَعْرِفَةَ الْحَقِّ وَالْعَمَلَ بِهِ لَا اللِّعْبَ بِالْفَتَاوَى. [51]"},
{q:"الِاجْتِهَادُ يَكُونُ فَقَطْ فِي الْقَضَايَا الَّتِي نَصَّ عَلَيْهَا الْإِجْمَاعُ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. مَوَاقِعُ الْإِجْمَاعِ لَا مَجَالَ لِلِاجْتِهَادِ فِيهَا وَتُؤْخَذُ كَمَا هِيَ. [52]"},
{q:"الْإِمَامُ مَالِكٌ ُسئِلَ عَنْ أَرْبَعِينَ مَسْأَلَةً فَأَجَابَ فِيهَا كُلِّهَا دُونَ تَرَدُّدٍ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. قَالَ فِي بِضْعٍ وَثَلَاثِينَ مِنْهَا (لَا أَدْرِي)، تَوْرُّعاً مِنْهُ عَنِ الْفُتْيَا بِلَا يَقِينٍ. [53]"},
{q:"مُجَرَّدُ (االتَّفَقُّهِ فِي الْفُرُوعِ) يُعْطِي الشَّخْصَ صَلَاحِيَّةَ الِاجْتِهَادِ الْمُطْلَقِ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. الْفُرُوعِيُّ لَيْسَ مُفْتِياً إِلَّا إِذَا عَرَفَ (مَآخِذَ الْأَحْكَامِ وَقَوَاعِدَهَا). [54]"},
{q:"عَلَى الْمُفْتِي تَقْدِيمُ حَلٍّ سَرِيعٍ دَائِماً حَتَّى وَلَوْ لَمْ يَسْتَفْصِلْ نِيَّةَ السَّائِلِ.",o:["صَوَابٌ","خَطَأٌ"],c:1,e:"خَطَأٌ. شَرْطٌ جَوْهَرِيٌّ (التَّصَوُّرُ التَّامُّ) الَّذِي يَسْتَلْزِمُ الِاسْتِفْصَالَ كَمَا فِي أَلْفَاظِ الظِّهَارِ. [28]"},
{q:"كَانَ ابْنُ سِيرِينَ يُسْأَلُ عَنْ تَعْبِيرِ 40 رُؤْيَا فَيَقُولُ فِي أَغْلَبِهَا (لَا أَدْرِي).",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. وَهَذَا مِنْ أَمْثِلَةِ تَوَرُّعِ الْعُلَمَاءِ الْكِبَارِ وَخَشْيَتِهِمْ، فَالْفَتْوَى أَمْرٌ جَلَلٌ. [55]"},
{q:"كِتَابُ (نَيْلُ الْأَوْطَارِ) مِنْ أَفْضَلِ الْكُتُبِ فِي شَرْحِ أَحَادِيثِ الْأَحْكَامِ.",o:["صَوَابٌ","خَطَأٌ"],c:0,e:"صَوَابٌ. هُوَ لِلشَّوْكَانِيِّ يَشْرَحُ مُنْتَقَى الْأَخْبَارِ، وَفِيهِ فَوَائِدُ لَا تُحْصَى. [32]"}
];

let cur = 0, sel = false;
const qEl = document.getElementById('question-text'), optsEl = document.getElementById('options-container'),
      fbBox = document.getElementById('feedback-box'), fbText = document.getElementById('feedback-text'),
      btnP = document.getElementById('prev-btn'), btnN = document.getElementById('next-btn'),
      prog = document.getElementById('progress-text');

function load(i) {
    sel = false; fbBox.style.display = 'none';
    const q = data[i];
    qEl.innerText = `${i+1}. ${q.q}`;
    prog.innerText = `السُّؤَالُ ${i+1} مِنْ ${data.length}`;
    optsEl.innerHTML = '';
    q.o.forEach((opt, idx) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = opt;
        b.onclick = () => check(idx, b, q);
        optsEl.appendChild(b);
    });
    btnP.disabled = i === 0; btnN.disabled = i === data.length - 1;
}

function check(idx, btn, q) {
    if (sel) return; sel = true;
    const btns = optsEl.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);
    if (idx === q.c) btn.classList.add('correct');
    else { btn.classList.add('wrong'); btns[q.c].classList.add('correct'); }
    fbText.innerText = q.e;
    fbBox.style.display = 'block';
}

function go(dir) {
    if (dir > 0 && cur < data.length - 1) cur++;
    else if (dir < 0 && cur > 0) cur--;
    load(cur);
}

load(0);
</script>
