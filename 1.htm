<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الشامل - أصول الفقه (مستوى فائق)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .quiz-container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;

            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

            text-align: center;

        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .badge {

        }

        }

        }
        .option {

            padding: 15px;

            display: flex;
            align-items: center;
        }
        .option:hover {
            background: #e9ecef;
        }

            margin-left: 15px;

        }

            border-color: #27ae60 !important;

            border-color: #f39c12 !important;
            color: #b7950b;
        }

            display: none;

            padding-top: 20px;

            background: #3498db;

            border: none;
            padding: 10px 25px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;

        }
        .btn:hover { background: #2980b9; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }

    </style>
</head>
<body>

<div class="quiz-container">
    <h2>الاختبار الشامل المتقدم (50 سؤال)</h2>
    
    <div id="quiz-area">
        <div class="q-header">
            <span class="badge" id="q-type"></span>
            <span class="progress" id="progress-text"></span>
        </div>
        <div class="question-text" id="q-text"></div>
        <ul class="options-container" id="options-list"></ul>
        <div class="explanation" id="explanation-box"></div>
    </div>

    <div class="controls">
        <button class="btn" id="next-btn" onclick="nextQuestion()">التالي</button>
        <button class="btn" id="prev-btn" onclick="prevQuestion()" disabled>السابق</button>
    </div>
</div>

<script>
    const questions = [
        // ======= 25 سؤال اختيار من متعدد =======
        {
            type: "اختيار من متعدد",
            q: "إذا علمنا أن 'علوم المقاصد' هي التي تُطلب لذاتها، فأي من الآتي يُعد من علوم الآلات التي تخدمها؟",
            opts: ["العقيدة والتوحيد", "الفقه بجميع أبوابه كالصلاة والحج", "علم مصطلح الحديث", "السيرة النبوية"],

        },
        {
            type: "اختيار من متعدد",
            q: "عندما طبق المحاضر قاعدة (إذا اجتمعا افترقا) على كلمتي (الدين) و(الخلق)، استنتج أن:",
            opts: ["الخلق هو مرادف للدين ولا ينفصل عنه في أي سياق.", "الدين يتعلق بالحال مع الله، والخلق يتعلق بالحال مع الناس، وكلاهما يُشكلان الدين الكلي.", "الدين يتعلق بالعبادات الظاهرة بينما الخلق يتعلق بالعقيدة الباطنة.", "الخلق من علوم المكملات بينما الدين من علوم الغايات."],

        },
        {
            type: "اختيار من متعدد",
            q: "ما هو التوجيه الأصولي لقول الإمام جلال الدين المحلّي عن الإمام مالك بأنه (مجتهد بالقوة لا بالفعل) حين أجاب بـ 'لا أدري'؟",
            opts: ["أنه يفتقر إلى مهارات الاستنباط الأصولية.", "أنه ملم بجميع الفروع الفقهية ولكن تنقصه القدرة على الإفتاء.", "أنه يمتلك الملكات والأدوات الأصولية للاستنباط وإن غابت عنه استحضار بعض المسائل الفرعية في حينها.", "أنه مجتهد في علوم الآلات ومبتدئ في علوم الغايات."],

            exp: "التصويب: المجتهد بالقوة هو من يملك الأدوات (المهارات) حتى لو غابت عنه المعلومات، بينما المجتهد بالفعل هو المُلم بالفروع دون الأدوات. [77، 81]"
        },
        {
            type: "اختيار من متعدد",

            opts: ["الفقيه الأصولي المالك لمهارات الاستنباط.", "المتفقه الفروعي (المجتهد بالفعل) الذي يملك معلومات محفوظة ويعجز إذا جاءته نازلة جديدة.", "طالب العلم المبتدئ الذي يحتاج إلى التلقين.", "العالم بعلوم المكملات كالتاريخ والسير."],

        },

        },

            opts: ["هي كلمات فارسية الأصل عربتها العرب وجرت عليها قواعد لسانهم، فانقطعت صلتها بأصلها وصارت لساناً عربياً فصيحاً.", "هي كلمات تثبت أن القرآن نزل بكل لغات الأرض وليس العربية فقط.", "هي من غريب اللغة الذي لم تفهمه قريش ولكن فهمته القبائل الأخرى.", "هي كلمات نُقلت كما هي دون تعريب لأنها لغة الملائكة."],
            ans: 0,
            exp: "التصويب: كل ما عربته العرب ولو كان أصله أعجمياً انقطعت صلته بأصله وصارت كلمة عربية تجري عليها قواعد لغة العرب. [51، 52]"
        },
        {

            opts: ["أن الإلمام بـ (لغة العرب) بجميع مفرداتها شرط أساسي للاجتهاد.", "أن المطلوب هو الإلمام بقواعد (لسان العرب) وتفصيله، وليس كل (لغة العرب) لأن الإلمام باللغة كاملة مستحيل حتى على العرب.", "أن الألفاظ الوحشية هي الأساس في استنباط الأحكام.", "أن كلام العلوج طغى على لسان قريش في العصر النبوي."],
            ans: 1,
            exp: "التصويب: الغرض معرفة لسان العرب تفصيلاً لا لغة العرب، لأن الإلمام باللغة مستحيل، بدليل عدم فهم القرشيين لكلام البدوي الوحشي. [47، 48، 49]"
        },
        {
            type: "اختيار من متعدد",
            q: "الفرق الدقيق بين (غريب القرآن) و(غريب اللغة) هو:",
            opts: ["غريب القرآن هو الألفاظ العربية الوحشية، وغريب اللغة هو الألفاظ المبهمة للأعاجم.", "غريب القرآن هو الألفاظ المبهمة للأعاجم أو التي تحتمل أكثر من معنى، وغريب اللغة هو الألفاظ العربية الوحشية كلغة البادية البعيدة.", "كلاهما مصطلحان مترادفان يشيران إلى الكلمات المعربة.", "غريب القرآن يتعلق بأسباب النزول، وغريب اللغة يتعلق بالشعر الجاهلي."],
            ans: 1,
            exp: "التصويب: غريب القرآن مقصود به الألفاظ المبهمة للأعاجم والتي تحتمل أكثر من معنى، وغريب اللغة هي الألفاظ الوحشية في البوادي. [33، 34]"
        },
        {
            type: "اختيار من متعدد",
            q: "ما هو السبب الأصولي الذي جعل ابن رشد يرجح مذهب الحنابلة والمالكية في مسألة (مسح الرأس)؟",
            opts: ["اعتماده على حديث جابر في صفة الحج.", "تخريجه للمسألة بناءً على قاعدة لغوية وهي أن حرف (الباء) في الأساس يُستعمل لـ (الإلصاق) وليس للتبعيض.", "لأنه كان يرفض مبدأ القياس الأصولي.", "لأن الشافعية لم يعتمدوا على مصطلح الحديث في هذه المسألة."],
            ans: 1,
            exp: "التصويب: الخلاف أُرجع لسبب لغوي (دلالة حرف الباء)، ولأن الأساس في اللغة أنها للإلصاق، رجح وجوب مسح كل الرأس. [70، 72، 73]"
        },
        {
            type: "اختيار من متعدد",
            q: "ماذا يُقصد بـ (العدالة الفقهية) وعلاقتها بـ (العدالة الحديثية)؟",
            opts: ["العدالة الحديثية تُدرس أولاً لإثبات الضبط، ثم تليها العدالة الفقهية.", "العدالة الفقهية (الإسلام وصلاح الدين) هي شرط أساسي مسلّم به ومقدمة تبدأ من حيث تنتهي لتبدأ بعدها دراسة العدالة الحديثية.", "هما مصطلحان مترادفان يُعنيان بضبط الراوي.", "العدالة الفقهية تختص بالصحابة والحديثية تختص بالتابعين."],
            ans: 1,
            exp: "التصويب: العدالة الحديثية تبدأ من حيث انتهت العدالة الفقهية؛ فالعدالة الدينية الفقهية شرط أساسي مسلّم به قبل بدء بحث عدالته الحديثية. [11]"
        },
        {
            type: "اختيار من متعدد",
            q: "تحذير العلماء في مقولة: (لا يفتي الناس صحفي، ولا يقرئهم مصحفي) يهدف إلى الحماية من:",
            opts: ["الاعتماد على الصحف لضعف طباعتها قديماً.", "الخلط بين المصطلحات (كالأصوليين والمحدثين) بسبب أخذ العلم من الكتب مباشرة دون الرجوع والتلقين من معلم.", "إهمال حفظ المتون والاعتماد على الفهم فقط.", "الطعن في المسانيد والمستخرجات."],
            ans: 1,
            exp: "التصويب: أخذ العلم من الكتب دون معلم يوقع في خطأ الخلط بين الألفاظ المتشابهة والخروج بالشاذ من القول. [35، 36، 37]"
        },
        {
            type: "اختيار من متعدد",
            q: "علم (أصول الفقه) هو العلم الخاص بـ:",

        },

            type: "اختيار من متعدد",
            q: "لماذا لم يعترض فصحاء العرب على (الأحرف المقطعة) في أوائل السور؟",

        },

    let currentQ = 0;

    const quizArea = document.getElementById("quiz-area");

    const progressText = document.getElementById("progress-text");
    const qText = document.getElementById("q-text");
    const optionsList = document.getElementById("options-list");
    const expBox = document.getElementById("explanation-box");
    
    const nextBtn = document.getElementById("next-btn");
    const prevBtn = document.getElementById("prev-btn");

    function loadQuestion(index) {
        isAnswered = false;
        const q = questions[index];
        
        qType.innerText = q.type;
        progressText.innerText = `السؤال ${index + 1} من ${questions.length}`;
        qText.innerText = `${index + 1}. ${q.q}`;
        
        optionsList.innerHTML = "";
        expBox.style.display = "none";
        expBox.innerText = q.exp;

        q.opts.forEach((opt, i) => {
            const li = document.createElement("li");
            li.className = "option";
            li.innerHTML = `<input type="radio" name="option" id="opt${i}"> <label for="opt${i}" style="width:100%; cursor:pointer;">${opt}</label>`;
            
            li.onclick = () => selectOption(li, i, q.ans);
            optionsList.appendChild(li);
        });

        updateButtons();
    }

    function selectOption(liElement, selectedIndex, correctIndex) {
        if (isAnswered) return; 
        isAnswered = true;
        
        liElement.querySelector('input').checked = true;
        
        const allLis = optionsList.querySelectorAll('.option');
        allLis.forEach((li, i) => {
            li.style.pointerEvents = "none"; // Disable clicking
            if (i === correctIndex) {
                li.classList.add("correct");
            } else if (i === selectedIndex && selectedIndex !== correctIndex) {
                li.classList.add("wrong");
            }
        });

        expBox.style.display = "block";
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            loadQuestion(currentQ);
        }
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            loadQuestion(currentQ);
        }
    }

    function updateButtons() {
        prevBtn.disabled = currentQ === 0;
        nextBtn.disabled = currentQ === questions.length - 1;
    }

    // Initialize the first question
    loadQuestion(currentQ);
