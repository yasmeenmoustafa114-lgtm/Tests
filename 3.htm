<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار أصول الفقه - المستوى المتقدم</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --wrong-bg: #fff3cd;
            --wrong-border: #ffeeba;
            --wrong-text: #856404;
            --btn-bg: #2980b9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .question-box {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .question-box.active {
            display: block;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .options-list {
            list-style-type: none;
            padding: 0;
        }
        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }
        .option:hover {
            background: #e2e6ea;
            border-color: #dae0e5;
        }
        .option.correct {
            background-color: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct-text);
            font-weight: bold;
            pointer-events: none;
        }
        .option.wrong {
            background-color: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong-text);
            pointer-events: none;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fd;
            border-right: 5px solid #3498db;
            border-radius: 5px;
            font-size: 1.05rem;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        button {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1c5980;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .progress {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #7f8c8d;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>اختبار أصول الفقه (مستوى متقدم)</h1>
    <div class="progress" id="progress-text">السؤال 1 من 60</div>
    
    <div id="quiz-body"></div>

    <div class="controls">
        <button id="prev-btn" onclick="prevQuestion()" disabled>السابق</button>
        <button id="next-btn" onclick="nextQuestion()">التالي</button>
    </div>
</div>

<script>
    // قاعدة بيانات الأسئلة (30 اختيار من متعدد + 30 صح/خطأ)
    const questions = [
        // أسئلة الاختيار من متعدد
        {
            type: 'mcq',
            q: 'إضافة قيد "المكتسبة عن أدلتها التفصيلية" في التعريف الاصطلاحي للفقه، يُعد دلالة قاطعة على أن:',
            opts: [
                'علم الفقه محصور في النقل المجرد عن السلف دون إعمال العقل.',
                'علم النبي صلى الله عليه وسلم بالأحكام لا يُسمى فقهاً بالمعنى الاصطلاحي لأنه وحي غير مكتسب.',
                'الفقه يتطلب معرفة الأحكام القطعية والظنية دون تفرقة.',
                'التقليد يُعد جزءاً من الفقه المكتسب لأنه يعتمد على سؤال العلماء.'
            ],
            ans: 1,
            exp: 'تصويب: تم إضافة القيد كي يخرج منها "العلم اللدنّي" لأنه غير مكتسب كعلم الملائكة وعلم النبي صلى الله عليه وسلم، فعلمه اكتسبه مباشرة بالوحي لا بالتعلم [5، 6].'
        },
        {
            type: 'mcq',
            q: 'في ضوء تحليل محترزات التعريف، إذا كان "الظن" لغةً قد يأتي بمعنى اليقين، فما هو التكييف الأصولي لاستخدام مصطلح "الظن" في تعريف الفقه عند المتأخرين؟',
            opts: [
                'استخدامه بمعنى الشك المرجوح لبيان قصور العقل البشري.',
                'استخدامه بالمعنى اللغوي القرآني ليدل على اليقين التام في كل المسائل.',
                'استخدامه كمصطلح حادث ليعني "غلبة الظن" نظراً لأن الكثير من الأحكام اجتهادية غير قطعية.',
                'استخدامه لبيان أن المسائل المجمع عليها قليلة جداً مقابل مسائل الخلاف.'
            ],
            ans: 2,
            exp: 'تفسير: الظن في كتاب الله يأتي بمعنى اليقين (لغة)، لكن الظن المقصود في التعريف هو "غلبة الظن" (اصطلاحاً)، لأن إدراك الأحكام الفقهية في الكثير من المسائل يكون ظنياً اجتهادياً [8، 10].'
        },
        {
            type: 'mcq',
            q: 'وفقاً لنقض الشيخ لتعريف الإمام الشيرازي للفقه بأنه (إدراك الأشياء الدقيقة)، أي من الآيات أو المفاهيم التالية استُخدمت لإثبات قصور هذا التعريف؟',
            opts: [
                'نفي الفقه عن المنافقين في فهمهم لغرض المتكلم.',
                'نفي الفقه عن الكفار لعدم إدراكهم لوحدانية الله وهي من أظهر البديهيات.',
                'إثبات الفقه للنبي صلى الله عليه وسلم في الأمور اللدنية الدقيقة.',
                'كون أغلب الفروع الفقهية للمتأخرين هي من الأمور الدقيقة جداً.'
            ],
            ans: 1,
            exp: 'تفسير: إدراك أن الله واحد أمر بديهي، ومع ذلك نفى الله به عن الكافرين الفقه لعدم إدراكهم له، فإذا كان عدم إدراك البديهي ينفي الفقه، فإن إدراكه من الفقه، مما ينقض حصر الفقه في "الأشياء الدقيقة" [1].'
        },
        {
            type: 'mcq',
            q: 'إذا استدل مستدل بحديث (غُسْلُ يَوْمِ الْجُمُعَةِ وَاجِبٌ) على التحريم القطعي لترك الغسل بناءً على مصطلح "واجب"، فما هو الخلل المنهجي في استدلاله؟',
            opts: [
                'أنه لم يجمع كل طرق الحديث ليتأكد من صحته.',
                'أنه خلط بين دلالة اللفظ اللغوية في عصر النبوة، وبين اصطلاح الأصوليين المتأخر.',
                'أنه لم يفرق بين الفقه الأكبر والفقه الأصغر.',
                'أنه استخدم القياس في موضع النص الإجمالي.'
            ],
            ans: 1,
            exp: 'تفسير: كلمة "واجب" في الحديث تحتمل لغةً الوجوب وتأكيد السنة، والنبي تكلم بلسان العرب وليس بلسان الأصوليين الذي ظهر متأخراً في القرن الرابع أو الخامس [8، 9].'
        },
        {
            type: 'mcq',
            q: 'أي من الكتب التالية يُعد تطبيقاً عملياً لمفهوم الفقه بأن أغلب ما يواجه المسلم هو المتفق عليه وليس المختلف فيه؟',
            opts: [
                'نفائس الأصول في شرح المحصول للقرافي.',
                'الرسالة للإمام الشافعي.',
                'الإقناع في مسائل الإجماع لابن القطان الفاسي.',
                'الآراء الشاذة في أصول الفقه للنملة.'
            ],
            ans: 2,
            exp: 'تفسير: كتاب الإقناع لابن القطان ذكر ما يقرب من 4000 إجماع، مما يدل على أن الفقه ليس مجرد خلاف كما يُتصور، بل كثير منه متفق عليه [10، 11].'
        },
        {
            type: 'mcq',
            q: 'إذا كان التدرج الاصطلاحي لمفهوم "الفقه" قد انتهى إلى حصر المعنى، فأي من المباحث التالية تم (إسقاطه) من التعريف المستقر للفقه في مراحله الأخيرة؟',
            opts: [
                'الأحكام الشرعية العملية الاجتهادية.',
                'الأحكام الشرعية العملية القطعية.',
                'الأحكام الشرعية العقائدية (العلميات).',
                'الأدلة التفصيلية كالكتاب والسنة.'
            ],
            ans: 2,
            exp: 'تفسير: استقر التعريف الاصطلاحي للفقه أخيراً على معرفة الأحكام الشرعية (الاجتهادية) العملية فقط، وأسقطوا معرفة الأحكام العلمية العقائدية (الفقه الأكبر) وحتى القطعية [24، 25].'
        },
        {
            type: 'mcq',
            q: 'عند تعريف أصول الفقه باعتباره مركباً إضافياً (مفرديه)، فإن دراسة قاعدة (الأمر يفيد الوجوب) تنتمي إلى:',
            opts: [
                'الدليل التفصيلي لأنه نص مقتبس من السنة.',
                'الدليل الإجمالي الذي ذكره المصنف في تعريف (المركب الإجمالي).',
                'الفقه الأكبر لارتباطه بالاعتقاد المطلق.',
                'الضابط الفقهي لأنه يختص بباب الأمر فقط.'
            ],
            ans: 1,
            exp: 'تفسير: الأدلة الإجمالية تعني القواعد الأصولية العامة مثل "الأمر يفيد الوجوب"، وهي جزء من تعريف أصول الفقه باعتباره علماً ولقباً (مركب إجمالي) وليس باعتبار مفرديه [28، 29].'
        },
        {
            type: 'mcq',
            q: 'يستهدف الدارس المعاصر لعلم أصول الفقه من دراسته (كغاية أولية واقعية):',
            opts: [
                'الاستنباط المباشر للأحكام من نصوص الكتاب والسنة.',
                'الوصول لمرتبة الاجتهاد المطلق في زمن قصير.',
                'فهم لغة المصنفين والعلماء وإدراك آليات الترجيح ودفع الشبهات.',
                'تفنيد الأحكام الفقهية للمذاهب الأربعة وتخطئتها.'
            ],
            ans: 2,
            exp: 'تفسير: لا بد أن تعلم أن دراسة الأصول ليست بغرض الاستنباط من نصوص الوحيين (فهذا خطير ويحتاج آلات)، بل الغرض حالياً هو "فهم لغة العلماء" وامتلاك لغة الرد على الشبهات [33، 36].'
        },
        {
            type: 'mcq',
            q: 'بناءً على مقولة الإمام القرافي في فضل أصول الفقه بأنه "جمع بين الشرفين"، يُقصد بالشرفين هنا:',
            opts: [
                'الفقه والعقيدة.',
                'المعقول (الدراية) والمنقول (الرواية).',
                'علم المنطق وعلم الكلام.',
                'القواعد الأصولية والقواعد الفقهية.'
            ],
            ans: 1,
            exp: 'تفسير: القرافي قال إن الأصول ليس رواية صرفة ولا معقولاً صرفاً بل "يحتاج فيه إلى الرواية والدراية" (المنقول والمعقول) [40، 41].'
        },
        {
            type: 'mcq',
            q: 'الفرق المنهجي بين (القاعدة الأصولية) و(القاعدة الفقهية) يتجلى في أن:',
            opts: [
                'الأولى خاصة بباب واحد، والثانية تشمل أبواباً متعددة.',
                'الأولى كلية لا تتخلف ومختصة بالأدلة، والثانية أغلبية لها استثناءات ومختصة بأفعال المكلفين.',
                'الأولى تُستمد من المنطق، والثانية تُستمد من السنة.',
                'الأولى من وضع المتكلمين، والثانية من وضع الفقهاء.'
            ],
            ans: 1,
            exp: 'تفسير: القاعدة الأصولية كلية متعلقة بأدلة الفقه (لا تتخلف)، بينما الفقهية أغلبية ولها استثناءات وتندرج تحتها مسائل فقهية [73، 74، 76].'
        },
        {
            type: 'mcq',
            q: 'ما هو التفسير الصحيح لتأثر الإمام الشافعي (واضع علم الأصول) باللغة العربية لدرجة اعتباره حجة فيها؟',
            opts: [
                'أنه حفظ كتب اللغويين المتقدمين حفظ رعاية.',
                'أنه درس المنطق الأرسطي وطبقه على لغة العرب.',
                'أنه أخذ اللغة بالتلقين مباشرة من أفواه العرب (قبيلة هذيل) وليس بالاكتساب.',
                'أنه تفرغ لكتابة الشعر وترك الفقه في بداية حياته.'
            ],
            ans: 2,
            exp: 'تفسير: الشافعي أخذ اللغة عن الهذليين بالتلقين من أفواه العرب مباشرة ولم يأخذها بالاكتساب من الكتب، فصار كلامه حجة لغوية ساعدته في إرساء القواعد [51، 52].'
        },
        {
            type: 'mcq',
            q: 'أي من المباحث التالية يُعتبر من مسائل علم أصول الفقه التابعة لقسم (المدلول)؟',
            opts: [
                'إثبات حجية خبر الآحاد.',
                'البحث في الحكم الشرعي المراد إثباته.',
                'دلالة صيغة النهي على التحريم.',
                'شروط المجتهد وكيفية تجزؤ الاجتهاد.'
            ],
            ans: 1,
            exp: 'تفسير: قسم (المدلول) متعلق بالحكم الشرعي الذي يراد إثباته. أما الحجية فتابعة لـ (الدليل)، ودلالة النهي تابعة لـ (الدلالة)، والمجتهد لـ (المستدل) [2].'
        },
        {
            type: 'mcq',
            q: 'قول الفقهاء: "كل قرض جر نفعاً مشروطاً فهو ربا" يُصنف منهجياً في أصول ومصطلحات الفقه بأنه:',
            opts: [
                'قاعدة أصولية لغوية.',
                'قاعدة فقهية كبرى.',
                'ضابط فقهي كلي.',
                'دليل إجمالي.'
            ],
            ans: 2,
            exp: 'تفسير: هذا "ضابط فقهي" لأنه يندرج تحت باب واحد محدد (باب الربا)، ويكون كلياً لضبط شيء في هذا الباب بخلاف القاعدة الفقهية التي تشمل أبواباً متعددة [77، 78].'
        },
        {
            type: 'mcq',
            q: 'في سياق استمداد علم الأصول، إذا أورد أصوليّ مبحثاً مطولاً حول (هل اللغات توقيفية أم اصطلاحية؟)، فإن هذا المبحث يُعد:',
            opts: [
                'من صميم أصول الفقه لأنه يؤثر في استنباط أحكام الطهارة.',
                'مبحثاً كلامياً متكلفاً لا يترتب عليه فرع فقهي واحد وينبغي تنحية الأصول عنه.',
                'مصدراً من مصادر الفقه الأكبر الذي لا يصح الاجتهاد بدونه.',
                'فرعاً من فروع الضوابط الفقهية اللغوية.'
            ],
            ans: 1,
            exp: 'تفسير: المباحث الكلامية (مثل هل اللغات توقيفية) مباحث لا يترتب عليها فرع فقهي واحد، ومحاولة بيان ترتب الخلاف عليها متكلفة جداً [3].'
        },
        {
            type: 'mcq',
            q: 'ما هو المأخذ النقدي على إدراج القواعد والحدود المنطقية في كتب أصول الفقه (ابتداءً من الجويني والغزالي)؟',
            opts: [
                'أنها تعارض نصوص الكتاب والسنة بشكل مباشر في العقائد.',
                'أنها علوم فلسفية لم تترجم إلا في العصر الحديث.',
                'أن علم المنطق لا يترتب على دراسته فرع فقهي واحد، ولم يعتمد عليه واضع العلم (الشافعي).',
                'أنها لا تُفهم إلا بمعرفة علم أصول الحديث.'
            ],
            ans: 2,
            exp: 'تفسير: المنطق لا يترتب على دراسته فرع فقهي واحد، ولم يحث الشرع عليه، والشافعي لم يذكر مصطلحاً منطقياً واحداً في (الرسالة)، ودخوله كان بعد ترجمات المأمون [56، 57].'
        },
        {
            type: 'mcq',
            q: 'أفضل مسلك لطالب العلم للتعامل مع المباحث الكلامية المبثوثة في كتب الأصول المطولة هو:',
            opts: [
                'حفظها واعتبارها قواعد أصولية قطعية لا تقبل النقاش.',
                'دراستها من خلال كتب تنقية الأصول (كمسائل أصول الدين المبحوث في علم أصول الفقه) لمعرفتها وتنحيتها.',
                'الاعتماد عليها كلياً في استنباط الأحكام العملية.',
                'إهمال كتب الأصول تماماً والاكتفاء بدراسة الحديث الموضوعي.'
            ],
            ans: 1,
            exp: 'تفسير: الكتب المنقية ككتاب د.خالد عبد اللطيف تفيد في سرد المسائل الكلامية لمعرفتها وتنحيتها لأنها لا ينبني عليها فروع فقهية [4].'
        },
        {
            type: 'mcq',
            q: 'من استنتاجات أبي بكر الرازي وابن القيم في تعريف الفقه بأنه (فهم غرض المتكلم):',
            opts: [
                'أن القرآن الكريم نزل بلغة تحتمل كل المعاني المتضادة في نفس الوقت.',
                'أنه إذا احتمل اللفظ القرآني معنيين متضادين (كالحيض والطهر) فالحق فيهما واحد فقط، والفقه هو الوصول إليه.',
                'أن الفقه يقتضي التوقف عن الترجيح عند تعارض المعاني اللغوية.',
                'أن الفقه الأكبر يشمل المتضادات العقائدية.'
            ],
            ans: 1,
            exp: 'تفسير: اللفظ قد يحمل أوجهاً (كالقرء)، ولا يجوز أن يكون المعنيان المتضادان مرادين معاً، فالحق واحد، وإدراك هذا المراد هو الفقه [19، 20].'
        },

    let currentQuestionIndex = 0;
    const quizBody = document.getElementById('quiz-body');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressText = document.getElementById('progress-text');

    // Shuffle questions
    questions.sort(() => Math.random() - 0.5);

    function initQuiz() {
        quizBody.innerHTML = '';
        questions.forEach((q, index) => {
            const qBox = document.createElement('div');
            qBox.className = `question-box ${index === 0 ? 'active' : ''}`;
            qBox.id = `q-${index}`;
            
            let optsHtml = '';
            q.opts.forEach((opt, oIndex) => {
                optsHtml += `<li class="option" onclick="checkAnswer(this, ${index}, ${oIndex}, ${q.ans})">${opt}</li>`;
            });

            qBox.innerHTML = `
                <div class="question-text">${index + 1}. ${q.q}</div>
                <ul class="options-list">${optsHtml}</ul>
                <div class="explanation" id="exp-${index}">${q.exp}</div>
            `;
            quizBody.appendChild(qBox);
        });
        updateControls();
    }

    function checkAnswer(selectedLi, qIndex, selectedOpt, correctOpt) {
        const qBox = document.getElementById(`q-${qIndex}`);
        const options = qBox.querySelectorAll('.option');
        const expDiv = document.getElementById(`exp-${qIndex}`);

        // Disable all options
        options.forEach(opt => opt.classList.add('disabled'));

        if (selectedOpt === correctOpt) {
            selectedLi.classList.add('correct');
        } else {
            selectedLi.classList.add('wrong');
            options[correctOpt].classList.add('correct');
            // Show explanation only if answered incorrectly, or show it always as a learning tool
            expDiv.style.display = 'block'; 
        }
        
        // Show explanation for correct answers too (as requested for thorough feedback)
        expDiv.style.display = 'block';
    }

    function updateControls() {
        prevBtn.disabled = currentQuestionIndex === 0;
        nextBtn.disabled = currentQuestionIndex === questions.length - 1;
        progressText.innerText = `السؤال ${currentQuestionIndex + 1} من ${questions.length}`;
        
        document.querySelectorAll('.question-box').forEach((box, index) => {
            box.classList.remove('active');
            if (index === currentQuestionIndex) box.classList.add('active');
        });
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            updateControls();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            updateControls();
        }
    }

    // Initialize Quiz
    initQuiz();
</script>
