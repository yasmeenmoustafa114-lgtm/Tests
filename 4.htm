    let currentQuestionIndex = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationBox = document.getElementById('explanation-box');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressText = document.getElementById('progress-text');
    const typeBadge = document.getElementById('question-type');

    function loadQuestion(index) {
        const qData = quizData[index];
        progressText.innerText = `السؤال ${index + 1} من ${quizData.length}`;
        typeBadge.innerText = qData.type === "MCQ" ? "اختيار من متعدد" : "صح أو خطأ";
        typeBadge.style.backgroundColor = qData.type === "MCQ" ? "#17a2b8" : "#6f42c1";
        
        questionText.innerText = qData.q;
        optionsContainer.innerHTML = '';
        explanationBox.style.display = 'none';

        qData.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            
            if (userAnswers[index] !== null) {
                div.classList.add('disabled');
                if (i === qData.ans) {
                    div.classList.add('correct');
                } else if (i === userAnswers[index]) {
                    div.classList.add('wrong');
                }
                explanationBox.innerText = qData.exp;
                explanationBox.style.display = 'block';
            } else {
                div.onclick = () => selectOption(i, div);
            }
            optionsContainer.appendChild(div);
        });

        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === quizData.length - 1;
    }

    function selectOption(selectedIndex, selectedDiv) {
        if (userAnswers[currentQuestionIndex] !== null) return; 

        userAnswers[currentQuestionIndex] = selectedIndex;
        const qData = quizData[currentQuestionIndex];
        const allOptions = optionsContainer.children;

        for (let i = 0; i < allOptions.length; i++) {
            allOptions[i].classList.add('disabled');
            if (i === qData.ans) {
                allOptions[i].classList.add('correct');
            }
        }

        if (selectedIndex !== qData.ans) {
            selectedDiv.classList.add('wrong');
        }

        explanationBox.innerText = qData.exp;
        explanationBox.style.display = 'block';
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    // تهيئة الاختبار عند أول تشغيل
    loadQuestion(0);
